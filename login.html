<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Sign In — Nexus</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='12' fill='%231a0e2e'/%3E%3Ctext x='50%25' y='56%25' dominant-baseline='middle' text-anchor='middle' font-size='26' font-family='serif'%3E✦%3C/text%3E%3C/svg%3E"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; font-size: 16px; }
body {
  min-height: 100%;
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0d0a1a;
  color: #f0ecff;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow-x: hidden;
}

/* ── Background ── */
.bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
}
.bg-grad {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 55% at 15% 5%, rgba(100,60,180,.32) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 88% 95%, rgba(40,100,120,.24) 0%, transparent 50%),
    radial-gradient(ellipse 45% 40% at 50% 50%, rgba(232,201,107,.05) 0%, transparent 65%);
}
.orb {
  position: absolute; border-radius: 50%; filter: blur(90px);
  animation: orb-float 22s ease-in-out infinite;
}
.orb-1 { width: 480px; height: 480px; background: rgba(110,65,220,.2); top: -12%; left: -8%; animation-delay: 0s; }
.orb-2 { width: 360px; height: 360px; background: rgba(232,201,107,.1); bottom: -8%; right: 2%; animation-delay: -9s; }
.orb-3 { width: 260px; height: 260px; background: rgba(78,205,196,.09); top: 42%; right: 22%; animation-delay: -17s; }
@keyframes orb-float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(18px, -14px) scale(1.04); }
  66% { transform: translate(-12px, 18px) scale(.97); }
}

/* ── Card ── */
.card {
  position: relative; z-index: 1;
  width: 100%; max-width: 440px;
  background: linear-gradient(160deg, rgba(28,23,52,.97) 0%, rgba(18,14,32,.99) 100%);
  border: 1px solid rgba(232,201,107,.2);
  border-radius: 24px;
  padding: 52px 44px 44px;
  box-shadow:
    0 24px 64px rgba(0,0,0,.72),
    0 0 0 1px rgba(232,201,107,.06),
    inset 0 1px 0 rgba(255,255,255,.07);
  animation: card-rise 0.7s cubic-bezier(.16,1,.3,1) both;
}
@keyframes card-rise {
  from { opacity: 0; transform: translateY(32px) scale(.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── Logo / Header ── */
.logo-wrap {
  display: flex; flex-direction: column; align-items: center; margin-bottom: 32px;
}
.star {
  font-size: 3rem; line-height: 1; margin-bottom: 14px;
  filter: drop-shadow(0 0 22px rgba(232,201,107,.65));
  animation: star-pulse 3.2s ease-in-out infinite;
  display: block;
}
@keyframes star-pulse {
  0%, 100% { filter: drop-shadow(0 0 18px rgba(232,201,107,.55)); }
  50%       { filter: drop-shadow(0 0 38px rgba(232,201,107,.92)); }
}
.title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 2.8rem; font-weight: 700; line-height: 1;
  background: linear-gradient(140deg, #f0ecff 10%, #e8c96b 65%, #f5dfa0 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -.01em; margin-bottom: 8px;
}
.subtitle {
  font-size: .87rem; color: rgba(200,194,224,.65); letter-spacing: .02em;
  text-align: center; line-height: 1.5;
}

/* ── Dividers ── */
.divider {
  display: flex; align-items: center; gap: 12px; margin: 22px 0;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(232,201,107,.22), transparent);
}
.divider-text {
  font-size: .68rem; color: rgba(74,70,104,.9); letter-spacing: .08em; white-space: nowrap;
  font-family: 'DM Sans', sans-serif;
}

/* ── Google Button ── */
.btn-google {
  width: 100%; padding: 14px 20px;
  display: flex; align-items: center; justify-content: center; gap: 12px;
  background: rgba(255,255,255,.055);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 12px;
  color: #f0ecff; font-family: 'DM Sans', sans-serif; font-size: .95rem; font-weight: 500;
  cursor: pointer;
  transition: background .22s, border-color .22s, box-shadow .22s, transform .18s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.btn-google:hover, .btn-google:focus {
  background: rgba(232,201,107,.1);
  border-color: rgba(232,201,107,.32);
  box-shadow: 0 8px 28px rgba(232,201,107,.16);
  transform: translateY(-1px);
  outline: none;
}
.btn-google:active { transform: translateY(0); }
.btn-google:disabled { opacity: .44; cursor: not-allowed; transform: none; box-shadow: none; }

/* ── Form Fields ── */
.form { display: flex; flex-direction: column; gap: 15px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field-label {
  font-size: .72rem; font-weight: 600; letter-spacing: .07em;
  text-transform: uppercase; color: rgba(132,127,160,.9);
}
.field-input {
  width: 100%; padding: 13px 16px;
  background: rgba(255,255,255,.045);
  border: 1.5px solid rgba(255,255,255,.1);
  border-radius: 11px;
  color: #f0ecff;
  font-family: 'DM Sans', sans-serif;
  font-size: 1rem;
  transition: border-color .2s, background .2s, box-shadow .2s;
  -webkit-appearance: none;
  appearance: none;
}
.field-input:focus {
  outline: none;
  border-color: rgba(232,201,107,.5);
  background: rgba(232,201,107,.06);
  box-shadow: 0 0 0 3px rgba(232,201,107,.1);
}
.field-input::placeholder { color: rgba(74,70,104,.8); }
.field-input:-webkit-autofill {
  -webkit-box-shadow: 0 0 0 100px rgba(28,23,52,.97) inset;
  -webkit-text-fill-color: #f0ecff;
  border-color: rgba(232,201,107,.35);
}

/* ── Error text ── */
.error-text {
  font-size: .75rem; color: #ff7b7b; min-height: 18px;
  text-align: center; transition: opacity .2s;
}

/* ── Submit Button ── */
.btn-submit {
  width: 100%; padding: 14px 20px;
  background: #e8c96b; color: #0d0a1a;
  border: none; border-radius: 12px;
  font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 700;
  cursor: pointer; letter-spacing: .01em;
  transition: background .2s, box-shadow .2s, transform .18s;
  -webkit-tap-highlight-color: transparent;
  display: flex; align-items: center; justify-content: center; gap: 9px;
}
.btn-submit:hover, .btn-submit:focus {
  background: #f5dfa0;
  box-shadow: 0 8px 28px rgba(232,201,107,.35);
  transform: translateY(-1px);
  outline: none;
}
.btn-submit:active { transform: translateY(0); }
.btn-submit:disabled { opacity: .42; cursor: not-allowed; transform: none; box-shadow: none; }

/* ── Links ── */
.links { margin-top: 18px; display: flex; flex-direction: column; gap: 8px; text-align: center; }
.link-text { font-size: .8rem; color: rgba(132,127,160,.75); }
.link-text a { color: #e8c96b; text-decoration: none; font-weight: 500; transition: color .18s; }
.link-text a:hover { color: #f5dfa0; }

/* ── Credits ── */
.credits {
  text-align: center; margin-top: 26px; padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,.07);
  font-size: .68rem; color: rgba(74,70,104,.75);
  font-family: 'DM Sans', sans-serif; letter-spacing: .04em;
}
.credits b { color: rgba(232,201,107,.5); }

/* ── Spinner ── */
.spinner {
  width: 18px; height: 18px; border-radius: 50%;
  border: 2.5px solid rgba(13,10,26,.25);
  border-top-color: #0d0a1a;
  animation: spin .7s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(70px);
  z-index: 999; background: rgba(26,21,48,.97);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 12px; padding: 12px 22px;
  font-size: .84rem; color: #f0ecff;
  box-shadow: 0 20px 60px rgba(0,0,0,.7);
  transition: transform .32s cubic-bezier(.16,1,.3,1), opacity .32s;
  opacity: 0; pointer-events: none; white-space: nowrap;
  font-family: 'DM Sans', sans-serif;
}
.toast.show   { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.ok     { border-color: rgba(123,198,126,.35); color: #7bc67e; }
.toast.err    { border-color: rgba(255,123,123,.35); color: #ff7b7b; }

/* ── Status badge ── */
.status-msg {
  display: none; padding: 12px 16px; border-radius: 10px;
  font-size: .82rem; line-height: 1.5; text-align: center; margin-bottom: 14px;
}
.status-msg.pending { display: block; background: rgba(232,201,107,.08); border: 1px solid rgba(232,201,107,.2); color: #e8c96b; }
.status-msg.rejected { display: block; background: rgba(255,123,123,.07); border: 1px solid rgba(255,123,123,.2); color: #ff7b7b; }

/* ── Mobile ── */
@media (max-width: 480px) {
  body { padding: 16px; align-items: flex-start; padding-top: 32px; }
  .card { padding: 40px 24px 36px; border-radius: 20px; }
  .title { font-size: 2.4rem; }
  .star { font-size: 2.6rem; }
}
</style>
</head>
<body>

<!-- Background -->
<div class="bg">
  <div class="bg-grad"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<!-- Card -->
<div class="card">

  <!-- Logo -->
  <div class="logo-wrap">
    <span class="star">✦</span>
    <div class="title">Nexus</div>
    <div class="subtitle">Your private study portal.<br>Sign in to continue.</div>
  </div>

  <!-- Status messages (shown if redirected with ?msg=) -->
  <div class="status-msg" id="status-msg"></div>

  <!-- Google Sign In -->
  <button class="btn-google" id="btn-google" type="button">
    <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>

  <div class="divider"><span class="divider-text">or sign in with email</span></div>

  <!-- Email/Password Form -->
  <form class="form" id="login-form" autocomplete="on" onsubmit="return false;">
    <div class="field">
      <label class="field-label" for="inp-email">Email Address</label>
      <input
        class="field-input"
        id="inp-email"
        name="email"
        type="email"
        placeholder="you@example.com"
        autocomplete="email"
        inputmode="email"
        spellcheck="false"
        autocorrect="off"
        autocapitalize="none"
      />
    </div>
    <div class="field">
      <label class="field-label" for="inp-password">Password</label>
      <input
        class="field-input"
        id="inp-password"
        name="password"
        type="password"
        placeholder="••••••••"
        autocomplete="current-password"
      />
    </div>
    <div class="error-text" id="error-text"></div>
    <button class="btn-submit" id="btn-submit" type="submit">
      Sign In
    </button>
  </form>

  <!-- Links -->
  <div class="links">
    <div class="link-text">No account? <a href="register.html">Register as Teacher →</a></div>
    <div class="link-text"><a href="index.html">← Back to home</a></div>
  </div>

  <div class="credits">Developed by <b>Aarav Sinha</b> · Nexus Study Portal</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
/* ════════════════════════════════
   NEXUS LOGIN · by Aarav Sinha
════════════════════════════════ */
const FC = {
  apiKey: "AIzaSyCqEEBANVyt-ybQD8z-pys2V-07-lxEWjA",
  authDomain: "nexus-705ef.firebaseapp.com",
  projectId: "nexus-705ef",
  storageBucket: "nexus-705ef.firebasestorage.app",
  messagingSenderId: "982944171585",
  appId: "1:982944171585:web:de65b6827ca769565ba8c0"
};
const ADMIN_EMAIL = "aaravhfs@gmail.com";

if (!firebase.apps.length) firebase.initializeApp(FC);
const auth = firebase.auth();
const db   = firebase.firestore();

const btnGoogle   = document.getElementById('btn-google');
const btnSubmit   = document.getElementById('btn-submit');
const inpEmail    = document.getElementById('inp-email');
const inpPassword = document.getElementById('inp-password');
const errorText   = document.getElementById('error-text');
const toastEl     = document.getElementById('toast');
const statusMsg   = document.getElementById('status-msg');

/* ── Show status from URL params (e.g. redirected from login.html?msg=pending) ── */
const urlMsg = new URLSearchParams(window.location.search).get('msg');
if (urlMsg === 'pending') {
  statusMsg.className = 'status-msg pending';
  statusMsg.textContent = '⏳ Your account is pending admin approval. You will be notified once approved.';
} else if (urlMsg === 'rejected') {
  statusMsg.className = 'status-msg rejected';
  statusMsg.textContent = '❌ Your registration was not approved. Contact admin for help.';
}

/* ── Toast ── */
function showToast(msg, type = '') {
  toastEl.textContent = msg;
  toastEl.className = 'toast show' + (type === 'ok' ? ' ok' : type === 'err' ? ' err' : '');
  clearTimeout(window._toastTmr);
  window._toastTmr = setTimeout(() => toastEl.classList.remove('show'), 3400);
}

/* ── Set loading state ── */
function setLoading(loading) {
  btnSubmit.disabled = loading;
  btnGoogle.disabled = loading;
  if (loading) {
    btnSubmit.innerHTML = '<div class="spinner"></div>';
  } else {
    btnSubmit.innerHTML = 'Sign In';
  }
}

/* ── Handle authenticated user ── */
async function handleUser(u) {
  if (!u) return;

  if (u.email === ADMIN_EMAIL) {
    window.location.href = 'admin.html';
    return;
  }

  try {
    const snap = await db.collection('users').doc(u.uid).get();

    if (!snap.exists) {
      // User has a Firebase Auth account but no Firestore profile — send to register
      await auth.signOut();
      window.location.href = 'register.html';
      return;
    }

    const data = snap.data();

    if (data.status === 'pending') {
      await auth.signOut();
      statusMsg.className = 'status-msg pending';
      statusMsg.textContent = '⏳ Your account is pending admin approval. Please wait.';
      setLoading(false);
      return;
    }

    if (data.status === 'rejected') {
      await auth.signOut();
      statusMsg.className = 'status-msg rejected';
      statusMsg.textContent = '❌ Your registration was rejected. Contact admin.';
      setLoading(false);
      return;
    }

    // Update last login silently
    db.collection('users').doc(u.uid)
      .set({ lastLogin: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true })
      .catch(() => {});

    window.location.href = 'user.html';

  } catch (e) {
    await auth.signOut();
    showToast(e.message, 'err');
    setLoading(false);
  }
}

/* ── Auth state observer ── */
auth.onAuthStateChanged(u => {
  if (u) handleUser(u);
});

/* ── Google Sign In ── */
btnGoogle.addEventListener('click', async () => {
  btnGoogle.disabled = true;
  btnGoogle.innerHTML = '<div class="spinner" style="border-top-color:#f0ecff"></div> Connecting…';
  errorText.textContent = '';
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    await auth.signInWithPopup(provider);
    // handleUser called by onAuthStateChanged
  } catch (e) {
    let msg = 'Sign in failed. Please try again.';
    if (e.code === 'auth/popup-closed-by-user') msg = 'Sign in was cancelled.';
    if (e.code === 'auth/popup-blocked') msg = 'Popup blocked. Please allow popups for this site.';
    showToast(msg, 'err');
    btnGoogle.disabled = false;
    btnGoogle.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Continue with Google`;
  }
});

/* ── Email / Password Sign In ── */
async function doEmailLogin() {
  const email    = inpEmail.value.trim();
  const password = inpPassword.value;
  errorText.textContent = '';

  if (!email) { inpEmail.focus(); errorText.textContent = 'Please enter your email address.'; return; }
  if (!password) { inpPassword.focus(); errorText.textContent = 'Please enter your password.'; return; }

  setLoading(true);
  try {
    await auth.signInWithEmailAndPassword(email, password);
    // redirect handled by onAuthStateChanged
  } catch (e) {
    setLoading(false);
    let msg = 'Sign in failed. Please try again.';
    if (['auth/user-not-found', 'auth/wrong-password', 'auth/invalid-credential', 'auth/invalid-email'].includes(e.code)) {
      msg = 'Incorrect email or password.';
    } else if (e.code === 'auth/too-many-requests') {
      msg = 'Too many failed attempts. Please wait before trying again.';
    } else if (e.code === 'auth/user-disabled') {
      msg = 'This account has been disabled.';
    }
    errorText.textContent = msg;
    inpPassword.value = '';
    inpPassword.focus();
  }
}

/* ── Form submit + Enter key ── */
document.getElementById('login-form').addEventListener('submit', e => {
  e.preventDefault();
  doEmailLogin();
});
btnSubmit.addEventListener('click', doEmailLogin);

inpEmail.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); inpPassword.focus(); }
});
inpPassword.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); doEmailLogin(); }
});
</script>
</body>
</html>
