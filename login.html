<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Sign In — Nexus</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='12' fill='%231a0e2e'/%3E%3Ctext x='50%25' y='56%25' dominant-baseline='middle' text-anchor='middle' font-size='26' font-family='serif'%3E✦%3C/text%3E%3C/svg%3E"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;font-size:16px}
body{
  min-height:100%;
  font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0d0a1a;color:#f0ecff;
  display:flex;align-items:center;justify-content:center;
  padding:20px;position:relative;overflow-x:hidden;
}
/* BG */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 70% 55% at 15% 5%,rgba(100,60,180,.32),transparent 55%),
    radial-gradient(ellipse 60% 50% at 88% 95%,rgba(40,100,120,.24),transparent 50%),
    radial-gradient(ellipse 40% 35% at 50% 50%,rgba(232,201,107,.05),transparent 65%);
}
.orb{position:absolute;border-radius:50%;filter:blur(90px);animation:of 22s ease-in-out infinite}
.o1{width:480px;height:480px;background:rgba(110,65,220,.2);top:-12%;left:-8%;animation-delay:0s}
.o2{width:360px;height:360px;background:rgba(232,201,107,.1);bottom:-8%;right:2%;animation-delay:-9s}
.o3{width:260px;height:260px;background:rgba(78,205,196,.09);top:42%;right:22%;animation-delay:-17s}
@keyframes of{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(18px,-14px) scale(1.04)}66%{transform:translate(-12px,18px) scale(.97)}}
/* CARD */
.card{
  position:relative;z-index:1;
  width:100%;max-width:420px;
  background:linear-gradient(160deg,rgba(28,23,52,.97),rgba(18,14,32,.99));
  border:1px solid rgba(232,201,107,.2);border-radius:28px;
  padding:56px 44px 48px;
  box-shadow:0 24px 64px rgba(0,0,0,.72),0 0 0 1px rgba(232,201,107,.06),inset 0 1px 0 rgba(255,255,255,.07);
  animation:rise .7s cubic-bezier(.16,1,.3,1) both;
  text-align:center;
}
@keyframes rise{from{opacity:0;transform:translateY(32px) scale(.96)}to{opacity:1;transform:none}}
/* STAR */
.star{
  font-size:3.6rem;line-height:1;margin-bottom:16px;display:block;
  filter:drop-shadow(0 0 22px rgba(232,201,107,.65));
  animation:sp 3.2s ease-in-out infinite;
}
@keyframes sp{0%,100%{filter:drop-shadow(0 0 18px rgba(232,201,107,.55))}50%{filter:drop-shadow(0 0 40px rgba(232,201,107,.95))}}
.title{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:3rem;font-weight:700;line-height:1;
  background:linear-gradient(140deg,#f0ecff 10%,#e8c96b 65%,#f5dfa0 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:10px;letter-spacing:-.01em;
}
.eyebrow{
  font-size:.72rem;font-family:'DM Sans',sans-serif;letter-spacing:.13em;
  text-transform:uppercase;color:rgba(232,201,107,.6);margin-bottom:8px;display:block;
}
.subtitle{font-size:.9rem;color:rgba(200,194,224,.62);line-height:1.6;margin-bottom:36px}
/* STATUS */
.status-box{
  display:none;padding:14px 16px;border-radius:12px;
  font-size:.83rem;line-height:1.55;margin-bottom:22px;
  text-align:left;
}
.status-box.pending{display:block;background:rgba(232,201,107,.08);border:1px solid rgba(232,201,107,.22);color:#e8c96b}
.status-box.rejected{display:block;background:rgba(255,123,123,.07);border:1px solid rgba(255,123,123,.22);color:#ff7b7b}
/* GOOGLE BUTTON */
.btn-google{
  width:100%;padding:16px 22px;
  display:flex;align-items:center;justify-content:center;gap:13px;
  background:rgba(255,255,255,.07);
  border:1.5px solid rgba(255,255,255,.14);
  border-radius:14px;
  color:#f0ecff;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;
  cursor:pointer;letter-spacing:.01em;
  transition:background .22s,border-color .22s,box-shadow .22s,transform .18s;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
.btn-google:hover,.btn-google:focus{
  background:rgba(232,201,107,.12);
  border-color:rgba(232,201,107,.38);
  box-shadow:0 10px 32px rgba(232,201,107,.2);
  transform:translateY(-2px);outline:none;
}
.btn-google:active{transform:translateY(0)}
.btn-google:disabled{opacity:.38;cursor:not-allowed;transform:none;box-shadow:none}
/* DIVIDER */
.or{
  display:flex;align-items:center;gap:12px;
  margin:28px 0 22px;font-size:.72rem;
  color:rgba(74,70,104,.7);letter-spacing:.08em;text-transform:uppercase;
}
.or::before,.or::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(232,201,107,.18),transparent)}
/* FEATURES STRIP */
.features{
  display:flex;justify-content:center;gap:0;
  margin-top:32px;border-top:1px solid rgba(255,255,255,.07);
  padding-top:24px;
}
.feat{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:0 6px;border-right:1px solid rgba(255,255,255,.07);
}
.feat:last-child{border-right:none}
.feat-ic{font-size:1.2rem;opacity:.75}
.feat-txt{font-size:.67rem;color:rgba(132,127,160,.7);line-height:1.35;text-align:center}
/* LINKS */
.links{margin-top:22px;display:flex;flex-direction:column;gap:8px}
.link-line{font-size:.8rem;color:rgba(132,127,160,.7)}
.link-line a{color:#e8c96b;text-decoration:none;font-weight:500;transition:color .18s}
.link-line a:hover{color:#f5dfa0}
/* CREDITS */
.credits{margin-top:24px;padding-top:18px;border-top:1px solid rgba(255,255,255,.07);font-size:.67rem;color:rgba(74,70,104,.7);letter-spacing:.04em}
.credits b{color:rgba(232,201,107,.5)}
/* SPINNER */
.spin{width:18px;height:18px;border-radius:50%;border:2.5px solid rgba(240,236,255,.2);border-top-color:#f0ecff;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);z-index:999;background:rgba(26,21,48,.97);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 22px;font-size:.84rem;color:#f0ecff;box-shadow:0 20px 60px rgba(0,0,0,.7);transition:transform .32s cubic-bezier(.16,1,.3,1),opacity .32s;opacity:0;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.ok{border-color:rgba(123,198,126,.35);color:#7bc67e}
.toast.err{border-color:rgba(255,123,123,.35);color:#ff7b7b}
@media(max-width:480px){
  body{padding:16px;align-items:flex-start;padding-top:36px}
  .card{padding:44px 24px 38px;border-radius:22px}
  .title{font-size:2.6rem}
  .star{font-size:3rem}
}
</style>
</head>
<body>

<div class="bg">
  <div class="o1 orb"></div><div class="o2 orb"></div><div class="o3 orb"></div>
</div>

<div class="card">
  <span class="star">✦</span>
  <span class="eyebrow">Private Tuition Portal</span>
  <div class="title">Nexus</div>
  <p class="subtitle">Your organised study space.<br>Sign in to access your materials.</p>

  <!-- Status messages -->
  <div class="status-box" id="status-box"></div>

  <!-- Google Sign In -->
  <button class="btn-google" id="btn-google" type="button">
    <svg width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>

  <div class="or"><span>secure · one click</span></div>

  <!-- Feature strip -->
  <div class="features">
    <div class="feat"><span class="feat-ic">📚</span><span class="feat-txt">Study Materials</span></div>
    <div class="feat"><span class="feat-ic">📹</span><span class="feat-txt">Live Classes</span></div>
    <div class="feat"><span class="feat-ic">🎬</span><span class="feat-txt">Recordings</span></div>
    <div class="feat"><span class="feat-ic">📋</span><span class="feat-txt">Class Notes</span></div>
  </div>

  <div class="links">
    <div class="link-line">New teacher? <a href="register.html">Register here →</a></div>
    <div class="link-line"><a href="index.html">← Back to home</a></div>
  </div>

  <div class="credits">Developed by <b>Aarav Sinha</b> · Nexus Study Portal</div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const FC={apiKey:"AIzaSyCqEEBANVyt-ybQD8z-pys2V-07-lxEWjA",authDomain:"nexus-705ef.firebaseapp.com",projectId:"nexus-705ef",storageBucket:"nexus-705ef.firebasestorage.app",messagingSenderId:"982944171585",appId:"1:982944171585:web:de65b6827ca769565ba8c0"};
const ADMIN="aaravhfs@gmail.com";
if(!firebase.apps.length)firebase.initializeApp(FC);
const auth=firebase.auth(),db=firebase.firestore();
const btn=document.getElementById('btn-google');
const statusBox=document.getElementById('status-box');
const toastEl=document.getElementById('toast');

// Show URL message params
const p=new URLSearchParams(window.location.search);
const msg=p.get('msg');
if(msg==='pending'){statusBox.className='status-box pending';statusBox.innerHTML='⏳ <strong>Pending approval.</strong> Your account is being reviewed by the admin. You\'ll be able to sign in once approved.';}
if(msg==='rejected'){statusBox.className='status-box rejected';statusBox.innerHTML='❌ <strong>Not approved.</strong> Your registration was not approved. Contact the admin for help.';}

function showToast(m,t){toastEl.textContent=m;toastEl.className='toast show'+(t==='ok'?' ok':t==='err'?' err':'');clearTimeout(window._tt);window._tt=setTimeout(()=>toastEl.classList.remove('show'),3600);}

function setLoading(on){
  btn.disabled=on;
  btn.innerHTML=on
    ?'<div class="spin"></div> Signing in…'
    :'<svg width="22" height="22" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Continue with Google';
}

async function handleUser(u){
  if(!u)return;
  if(u.email===ADMIN){window.location.href='admin.html';return;}
  setLoading(true);
  try{
    const snap=await db.collection('users').doc(u.uid).get();
    if(!snap.exists){
      // Brand new Google user — hasn't registered yet
      await auth.signOut();
      window.location.href='register.html';
      return;
    }
    const d=snap.data();
    if(d.status==='pending'){
      await auth.signOut();
      statusBox.className='status-box pending';
      statusBox.innerHTML='⏳ <strong>Pending approval.</strong> Your account is being reviewed by the admin.';
      setLoading(false);
      return;
    }
    if(d.status==='rejected'){
      await auth.signOut();
      statusBox.className='status-box rejected';
      statusBox.innerHTML='❌ <strong>Not approved.</strong> Contact the admin for help.';
      setLoading(false);
      return;
    }
    // Update last login silently
    db.collection('users').doc(u.uid).set({lastLogin:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}).catch(()=>{});
    window.location.href='user.html';
  }catch(e){
    await auth.signOut().catch(()=>{});
    showToast(e.message,'err');
    setLoading(false);
  }
}

// If already signed in
auth.onAuthStateChanged(u=>{if(u)handleUser(u);});

btn.addEventListener('click',async()=>{
  setLoading(true);
  try{
    const provider=new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({prompt:'select_account'});
    await auth.signInWithPopup(provider);
    // handleUser called by onAuthStateChanged
  }catch(e){
    let m='Sign in failed. Please try again.';
    if(e.code==='auth/popup-closed-by-user')m='Sign in cancelled.';
    if(e.code==='auth/popup-blocked')m='Popup blocked — please allow popups for this site.';
    showToast(m,'err');
    setLoading(false);
  }
});
</script>
</body>
</html>
