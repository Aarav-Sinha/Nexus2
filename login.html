<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign In — Nexus</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='12' fill='%231a0e2e'/%3E%3Ctext x='50%25' y='56%25' dominant-baseline='middle' text-anchor='middle' font-size='26' font-family='serif'%3E✦%3C/text%3E%3C/svg%3E"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{--ink:#0d0a1a;--ink2:#1a1530;--gold:#e8c96b;--gold2:#f5dfa0;--t0:#f0ecff;--t1:#c8c2e0;--t2:#847fa0;--t3:#4a4668;--rose:#ff7b7b;--rim:rgba(255,255,255,.08);--rim2:rgba(255,255,255,.14);--r3:24px;--sh:0 20px 60px rgba(0,0,0,.7);--shg:0 8px 32px rgba(232,201,107,.2);--serif:'Cormorant Garamond',serif;--sans:'DM Sans',sans-serif;--mono:'Fira Code',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--sans);background:var(--ink);color:var(--t0);font-size:15px;display:flex;align-items:center;justify-content:center}
.bg{position:fixed;inset:0;pointer-events:none;overflow:hidden}
.bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 10% 0%,rgba(100,60,180,.28),transparent 60%),radial-gradient(ellipse 60% 50% at 90% 100%,rgba(40,100,120,.22),transparent 55%)}
.orb{position:absolute;border-radius:50%;filter:blur(80px);animation:float 20s ease-in-out infinite}
.o1{width:500px;height:500px;background:rgba(120,70,220,.18);top:-15%;left:-10%}
.o2{width:400px;height:400px;background:rgba(232,201,107,.1);bottom:-10%;right:5%;animation-delay:-8s}
@keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(15px,-10px)}}
.card{position:relative;z-index:1;width:calc(100% - 32px);max-width:420px;border-radius:var(--r3);background:linear-gradient(145deg,rgba(26,21,48,.97),rgba(20,16,36,.99));border:1px solid rgba(232,201,107,.18);padding:50px 42px 42px;box-shadow:var(--sh),inset 0 1px 0 rgba(255,255,255,.06);animation:asc .65s cubic-bezier(.16,1,.3,1) both;margin:24px 0}
@keyframes asc{from{opacity:0;transform:translateY(28px) scale(.96)}to{opacity:1;transform:none}}
.star{font-size:2.2rem;display:block;text-align:center;margin-bottom:16px;filter:drop-shadow(0 0 18px rgba(232,201,107,.5));animation:sp 3s ease infinite}
@keyframes sp{0%,100%{filter:drop-shadow(0 0 18px rgba(232,201,107,.4))}50%{filter:drop-shadow(0 0 30px rgba(232,201,107,.8))}}
h1{font-family:var(--serif);font-size:2.4rem;font-weight:700;text-align:center;background:linear-gradient(135deg,#f0ecff,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:6px}
.sub{text-align:center;color:var(--t2);font-size:.84rem;margin-bottom:28px}
.divider{display:flex;align-items:center;gap:10px;margin:22px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(232,201,107,.2),transparent)}
.divider span{font-size:.63rem;color:var(--t3);font-family:var(--mono);letter-spacing:.08em}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.fg label{font-size:.67rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t2)}
.fi{padding:11px 14px;background:rgba(255,255,255,.04);border:1px solid var(--rim);border-radius:10px;color:var(--t0);font-size:.88rem;outline:none;width:100%;transition:all .2s}
.fi:focus{border-color:rgba(232,201,107,.38);background:rgba(232,201,107,.04)}
.fi::placeholder{color:var(--t3)}
.btn{width:100%;padding:13px;border-radius:11px;border:none;font-size:.93rem;font-weight:600;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-g{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--t0);margin-bottom:10px}
.btn-g:hover{background:rgba(232,201,107,.1);border-color:rgba(232,201,107,.3);box-shadow:var(--shg);transform:translateY(-1px)}
.btn-main{background:var(--gold);color:#0d0a1a;font-weight:700}
.btn-main:hover{background:var(--gold2);box-shadow:var(--shg);transform:translateY(-1px)}
.btn:disabled{opacity:.4;cursor:default;transform:none !important;box-shadow:none !important}
.err{font-size:.73rem;color:var(--rose);text-align:center;margin-top:8px;min-height:20px}
.note{font-size:.7rem;color:var(--t3);text-align:center;margin-top:16px}
.note a{color:var(--gold);transition:opacity .15s}
.note a:hover{opacity:.75}
.cred{text-align:center;padding-top:20px;margin-top:20px;border-top:1px solid var(--rim);font-size:.67rem;color:var(--t3);font-family:var(--mono)}
.cred b{color:rgba(232,201,107,.45)}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(60px);z-index:99;background:rgba(26,21,48,.97);border:1px solid var(--rim);border-radius:11px;padding:10px 18px;font-size:.82rem;color:var(--t0);box-shadow:var(--sh);transition:transform .3s cubic-bezier(.16,1,.3,1),opacity .3s;opacity:0;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.err{border-color:rgba(255,123,123,.3);color:var(--rose)}
.toast.ok{border-color:rgba(123,198,126,.3);color:#7bc67e}
.spin{width:18px;height:18px;border-radius:50%;border:2px solid rgba(232,201,107,.15);border-top-color:var(--gold);animation:spin .75s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="bg"><div class="orb o1"></div><div class="orb o2"></div></div>
<div class="card">
  <span class="star">✦</span>
  <h1>Nexus</h1>
  <p class="sub">Sign in to your portal</p>

  <!-- Google -->
  <button class="btn btn-g" id="g-btn">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>

  <div class="divider"><span>or sign in with email</span></div>

  <div class="fg"><label>Email</label><input class="fi" id="em" type="email" placeholder="you@example.com" autocomplete="email"/></div>
  <div class="fg"><label>Password</label><input class="fi" id="pw" type="password" placeholder="••••••••" autocomplete="current-password"/></div>
  <div class="err" id="err"></div>
  <button class="btn btn-main" id="login-btn" style="margin-top:4px">Sign In</button>

  <p class="note">Don't have an account? <a href="register.html">Register here</a></p>
  <p class="note" style="margin-top:6px"><a href="index.html">← Back to home</a></p>
  <div class="cred">Developed by <b>Aarav Sinha</b></div>
</div>
<div class="toast" id="toast"></div>
<script>
const FC={apiKey:"AIzaSyCqEEBANVyt-ybQD8z-pys2V-07-lxEWjA",authDomain:"nexus-705ef.firebaseapp.com",projectId:"nexus-705ef",storageBucket:"nexus-705ef.firebasestorage.app",messagingSenderId:"982944171585",appId:"1:982944171585:web:de65b6827ca769565ba8c0"};
const ADMIN="aaravhfs@gmail.com";
if(!firebase.apps.length)firebase.initializeApp(FC);
const auth=firebase.auth(),db=firebase.firestore();
const $=id=>document.getElementById(id);

function toast(msg,type){const t=$('toast');t.textContent=msg;t.className='toast show'+(type==='ok'?' ok':type==='err'?' err':'');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),3200);}

// Check already logged in
auth.onAuthStateChanged(async u=>{
  if(u){
    if(u.email===ADMIN){window.location.href='admin.html';return;}
    // Check if user is approved
    try{
      const snap=await db.collection('users').doc(u.uid).get();
      if(snap.exists){
        const d=snap.data();
        if(d.status==='approved'){window.location.href='dashboard.html';}
        else if(d.status==='pending'){toast('Your registration is pending admin approval.','err');auth.signOut();}
        else if(d.status==='rejected'){toast('Your registration was rejected.','err');auth.signOut();}
        else{window.location.href='dashboard.html';}
      } else {
        // New Google sign-in — go to register if not admin
        window.location.href='register.html?uid='+u.uid+'&email='+encodeURIComponent(u.email||'')+'&name='+encodeURIComponent(u.displayName||'');
      }
    }catch(e){toast(e.message,'err');}
  }
});

$('g-btn').addEventListener('click',async()=>{
  $('g-btn').disabled=true;
  try{
    const provider=new firebase.auth.GoogleAuthProvider();
    await auth.signInWithPopup(provider);
    // onAuthStateChanged handles redirect
  }catch(e){toast(e.message,'err');$('g-btn').disabled=false;}
});

$('login-btn').addEventListener('click',async()=>{
  const em=$('em').value.trim(),pw=$('pw').value;
  $('err').textContent='';
  if(!em||!pw){$('err').textContent='Please enter email and password.';return;}
  $('login-btn').innerHTML='<div class="spin"></div>';$('login-btn').disabled=true;
  try{
    await auth.signInWithEmailAndPassword(em,pw);
    // redirect handled by onAuthStateChanged
  }catch(e){
    let msg=e.message;
    if(e.code==='auth/user-not-found'||e.code==='auth/wrong-password')msg='Invalid email or password.';
    if(e.code==='auth/invalid-email')msg='Invalid email address.';
    $('err').textContent=msg;
    $('login-btn').innerHTML='Sign In';$('login-btn').disabled=false;
  }
});

$('pw').addEventListener('keydown',e=>{if(e.key==='Enter')$('login-btn').click();});
</script>
</body>
</html>
