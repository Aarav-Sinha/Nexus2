<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sign In — Nexus</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='12' fill='%231a0e2e'/%3E%3Ctext x='50%25' y='56%25' dominant-baseline='middle' text-anchor='middle' font-size='26' font-family='serif'%3E✦%3C/text%3E%3C/svg%3E"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700&family=DM+Sans:wght@300;400;500;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css"/>
<style>
body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{position:relative;z-index:1;width:100%;max-width:420px;border-radius:var(--r3);background:linear-gradient(145deg,rgba(26,21,48,.97),rgba(20,16,36,.99));border:1px solid rgba(232,201,107,.18);padding:50px 42px 42px;box-shadow:var(--sh),inset 0 1px 0 rgba(255,255,255,.06);animation:ascend .65s cubic-bezier(.16,1,.3,1) both}
.star{font-size:2.4rem;display:block;text-align:center;margin-bottom:16px;filter:drop-shadow(0 0 18px rgba(232,201,107,.5));animation:sp 3s ease infinite}
@keyframes sp{0%,100%{filter:drop-shadow(0 0 18px rgba(232,201,107,.4))}50%{filter:drop-shadow(0 0 30px rgba(232,201,107,.8))}}
h1{font-family:var(--serif);font-size:2.5rem;font-weight:700;text-align:center;background:linear-gradient(135deg,#f0ecff,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:5px}
.sub{text-align:center;color:var(--t2);font-size:.83rem;margin-bottom:28px}
.divider{display:flex;align-items:center;gap:10px;margin:20px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(232,201,107,.2),transparent)}
.divider span{font-size:.63rem;color:var(--t3);font-family:var(--mono);letter-spacing:.08em}
.form{display:flex;flex-direction:column;gap:14px}
.btn-google{display:flex;align-items:center;justify-content:center;gap:11px;width:100%;padding:13px;border-radius:11px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--t0);font-size:.93rem;font-weight:500;cursor:pointer;transition:all .25s}
.btn-google:hover{background:rgba(232,201,107,.1);border-color:rgba(232,201,107,.3);box-shadow:var(--shg);transform:translateY(-1px)}
.btn-google:disabled{opacity:.4;cursor:default;transform:none;box-shadow:none}
.btn-main{width:100%;padding:13px;border-radius:11px;border:none;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .25s;background:var(--gold);color:#0d0a1a}
.btn-main:hover{background:var(--gold2);box-shadow:var(--shg);transform:translateY(-1px)}
.btn-main:disabled{opacity:.4;cursor:default;transform:none;box-shadow:none}
.err{font-size:.73rem;color:var(--rose);text-align:center;min-height:18px}
.note{font-size:.7rem;color:var(--t3);text-align:center;margin-top:14px}
.note a{color:var(--gold);transition:opacity .15s}
.note a:hover{opacity:.75}
.cred{text-align:center;padding-top:18px;margin-top:18px;border-top:1px solid var(--rim);font-size:.66rem;color:var(--t3);font-family:var(--mono)}
.cred b{color:rgba(232,201,107,.45)}
.spin-in{width:18px;height:18px;border-radius:50%;border:2px solid rgba(13,10,26,.2);border-top-color:#0d0a1a;animation:spin .75s linear infinite;display:inline-block}
</style>
</head>
<body>
<div class="page-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<div class="card">
  <span class="star">✦</span>
  <h1>Nexus</h1>
  <p class="sub">Sign in to your portal</p>

  <button class="btn-google" id="g-btn">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>

  <div class="divider"><span>or email</span></div>

  <div class="form">
    <div class="fg"><label>Email</label><input class="fi" id="em" type="email" placeholder="you@example.com" autocomplete="email"/></div>
    <div class="fg"><label>Password</label><input class="fi" id="pw" type="password" placeholder="••••••••" autocomplete="current-password"/></div>
    <div class="err" id="err"></div>
    <button class="btn-main" id="login-btn">Sign In</button>
  </div>

  <p class="note">No account? <a href="register.html">Register here</a></p>
  <p class="note" style="margin-top:6px"><a href="index.html">← Back to home</a></p>
  <div class="cred">Developed by <b>Aarav Sinha</b></div>
</div>
<div class="toast" id="toast"></div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const FC={apiKey:"AIzaSyCqEEBANVyt-ybQD8z-pys2V-07-lxEWjA",authDomain:"nexus-705ef.firebaseapp.com",projectId:"nexus-705ef",storageBucket:"nexus-705ef.firebasestorage.app",messagingSenderId:"982944171585",appId:"1:982944171585:web:de65b6827ca769565ba8c0"};
const ADMIN="aaravhfs@gmail.com";
if(!firebase.apps.length)firebase.initializeApp(FC);
const auth=firebase.auth(),db=firebase.firestore();
const $=id=>document.getElementById(id);

function toast(msg,type){const t=$('toast');t.textContent=msg;t.className='toast show'+(type==='ok'?' ok':type==='err'?' err':'');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),3400);}

async function handleUser(u){
  if(!u) return;
  if(u.email===ADMIN){window.location.href='admin.html';return;}
  // Update last login
  try{ await db.collection('users').doc(u.uid).set({lastLogin:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}); }catch(e){}
  try{
    const snap=await db.collection('users').doc(u.uid).get();
    if(!snap.exists){
      // New Google user — needs to register
      await auth.signOut();
      window.location.href='register.html';
      return;
    }
    const d=snap.data();
    if(d.status==='pending'){toast('Your account is pending admin approval. Please wait.','err');await auth.signOut();return;}
    if(d.status==='rejected'){toast('Your registration was rejected. Contact admin.','err');await auth.signOut();return;}
    window.location.href='user.html';
  }catch(e){toast(e.message,'err');}
}

auth.onAuthStateChanged(u=>{if(u) handleUser(u);});

$('g-btn').addEventListener('click',async()=>{
  $('g-btn').disabled=true;$('err').textContent='';
  try{
    const p=new firebase.auth.GoogleAuthProvider();
    await auth.signInWithPopup(p);
  }catch(e){toast(e.message,'err');$('g-btn').disabled=false;}
});

$('login-btn').addEventListener('click',async()=>{
  const em=$('em').value.trim(),pw=$('pw').value;
  $('err').textContent='';
  if(!em||!pw){$('err').textContent='Enter email and password.';return;}
  $('login-btn').innerHTML='<div class="spin-in"></div>';$('login-btn').disabled=true;
  try{
    await auth.signInWithEmailAndPassword(em,pw);
  }catch(e){
    let msg=e.message;
    if(['auth/user-not-found','auth/wrong-password','auth/invalid-credential'].includes(e.code))msg='Invalid email or password.';
    if(e.code==='auth/invalid-email')msg='Invalid email address.';
    $('err').textContent=msg;
    $('login-btn').innerHTML='Sign In';$('login-btn').disabled=false;
  }
});

$('pw').addEventListener('keydown',e=>{if(e.key==='Enter')$('login-btn').click();});
</script>
</body>
</html>
