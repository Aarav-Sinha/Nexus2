<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Nexus — Dashboard</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='12' fill='%231a0e2e'/%3E%3Ctext x='50%25' y='56%25' dominant-baseline='middle' text-anchor='middle' font-size='26' font-family='serif'%3E✦%3C/text%3E%3C/svg%3E"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css"/>
<style>
body{overflow:hidden;height:100vh}
.app{display:flex;height:100vh;position:relative;z-index:1}

/* ── HOME HERO ── */
.hero{border-radius:var(--r3);padding:30px 28px;margin-bottom:20px;
  background:linear-gradient(135deg,rgba(100,60,200,.14),rgba(232,201,107,.08),rgba(78,205,196,.06));
  border:1px solid rgba(232,201,107,.12);position:relative;overflow:hidden;
  animation:fade-up .5s cubic-bezier(.16,1,.3,1) both}
.hero::before{content:'';position:absolute;right:-20px;top:-20px;width:200px;height:200px;
  border-radius:50%;background:radial-gradient(circle,rgba(232,201,107,.08),transparent 70%);pointer-events:none}
.hero-eye{font-size:.61rem;font-family:var(--mono);letter-spacing:.12em;text-transform:uppercase;
  color:var(--gold);opacity:.75;margin-bottom:8px;display:flex;align-items:center;gap:7px}
.hero-eye::before{content:'';width:18px;height:1px;background:var(--gold)}
.hero h2{font-family:var(--serif);font-size:2.2rem;font-weight:600;line-height:1.15;color:var(--t0)}
.hero h2 em{font-style:italic;color:var(--gold)}
.hero-sub{color:var(--t1);font-size:.84rem;margin-top:8px;max-width:400px;line-height:1.65}

/* ── MEET CARD ── */
.meet-card{border-radius:var(--r2);overflow:hidden;margin-bottom:20px;
  border:1px solid rgba(78,205,196,.2);
  background:linear-gradient(135deg,rgba(20,50,60,.6),rgba(13,10,26,.8));
  position:relative;animation:fade-up .5s .1s cubic-bezier(.16,1,.3,1) both}
.meet-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(78,205,196,.05),transparent);pointer-events:none}
.meet-row{display:flex;align-items:stretch}
.meet-col{width:68px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  background:rgba(26,115,232,.07);border-right:1px solid rgba(78,205,196,.1);padding:14px 0}
.meet-logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#1a73e8,#34a853);
  display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(26,115,232,.3)}
.meet-body{flex:1;padding:14px 16px 12px;min-width:0}
.meet-toprow{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.meet-chip{font-size:.59rem;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;
  padding:2px 7px;border-radius:99px;color:var(--teal);background:rgba(78,205,196,.1);border:1px solid rgba(78,205,196,.2)}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--sage);flex-shrink:0;animation:ldot 2s ease infinite}
.ltxt{font-size:.59rem;font-family:var(--mono);color:var(--sage);letter-spacing:.08em;text-transform:uppercase}
@keyframes ldot{0%,100%{box-shadow:0 0 0 2px rgba(123,198,126,.2)}50%{box-shadow:0 0 0 5px rgba(123,198,126,.08)}}
.meet-title{font-size:.98rem;font-weight:600;color:var(--t0);margin-bottom:2px}
.meet-timerow{display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--t2);margin-top:4px}
.meet-desc-box{margin-top:8px;padding:8px 10px;border-radius:8px;
  background:rgba(255,255,255,.04);border-left:2px solid rgba(232,201,107,.3);
  font-size:.74rem;color:var(--t1);line-height:1.55}
.meet-right{padding:14px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:7px;flex-shrink:0}
.btn-join{display:flex;align-items:center;gap:7px;padding:10px 16px;border-radius:10px;
  background:linear-gradient(135deg,#1a73e8,#1558b0);color:#fff;border:none;
  font-size:.83rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;
  box-shadow:0 4px 14px rgba(26,115,232,.3)}
.btn-join:hover{transform:translateY(-2px);box-shadow:0 7px 22px rgba(26,115,232,.42)}
.btn-join:disabled{opacity:.35;cursor:default;transform:none;box-shadow:none}
.btn-join.soon{background:linear-gradient(135deg,rgba(26,115,232,.3),rgba(21,88,176,.3));
  border:1px solid rgba(26,115,232,.3);box-shadow:none}
.cd-txt{font-size:.65rem;font-family:var(--mono);color:var(--t3);text-align:right}

/* ── CONTACT / SUGGEST CARDS ── */
.info-card{border-radius:var(--r2);padding:18px 22px;margin-bottom:18px}
.info-card.contact-card{border:1px solid rgba(184,169,248,.14);background:linear-gradient(135deg,rgba(100,60,200,.08),rgba(13,10,26,.6))}
.info-card.suggest-card{border:1px dashed rgba(232,201,107,.2);background:rgba(232,201,107,.03)}
.info-card-lbl{font-size:.6rem;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;
  margin-bottom:10px;display:flex;align-items:center;gap:6px}
.info-card-lbl::before{content:'';width:10px;height:1px}
.info-card.contact-card .info-card-lbl{color:var(--lilac);opacity:.7}
.info-card.contact-card .info-card-lbl::before{background:var(--lilac)}
.info-card.suggest-card .info-card-lbl{color:var(--gold);opacity:.7}
.info-card.suggest-card .info-card-lbl::before{background:var(--gold)}
.info-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.info-txt{font-size:.84rem;color:var(--t1);flex:1;min-width:160px;line-height:1.55}
.info-txt b{color:var(--t0)}
.info-btns{display:flex;gap:8px;flex-wrap:wrap}
.cbtn{display:flex;align-items:center;gap:6px;padding:9px 14px;border-radius:10px;
  border:none;font-size:.79rem;font-weight:500;cursor:pointer;transition:all .2s}
.cbtn-wa{background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.2);color:#25d366}
.cbtn-wa:hover{background:rgba(37,211,102,.18);transform:translateY(-1px)}
.cbtn-em{background:rgba(184,169,248,.1);border:1px solid rgba(184,169,248,.2);color:var(--lilac)}
.cbtn-em:hover{background:rgba(184,169,248,.16);transform:translateY(-1px)}

/* ── ACCESS REQUEST BANNER ── */
.access-banner{border-radius:var(--r);padding:12px 16px;margin-bottom:14px;
  background:rgba(232,201,107,.05);border:1px solid rgba(232,201,107,.18);
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.access-banner-txt{font-size:.82rem;color:var(--t1)}
.access-banner-txt b{color:var(--gold)}

/* ── LOCKED SUBJECT ── */
.card-locked{opacity:.5;cursor:not-allowed;filter:grayscale(.4)}
.card-locked:hover{transform:none !important;box-shadow:none !important;border-color:var(--rim) !important}
.card-locked::before{display:none !important}
.lock-overlay{position:absolute;top:8px;right:8px;font-size:.85rem;z-index:5}

/* ── VIEWER ── */
</style>
</head>
<body>
<div class="page-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>

<!-- PAGE LOADER -->
<div class="page-loader" id="loader">
  <div style="font-size:2.2rem;filter:drop-shadow(0 0 20px rgba(232,201,107,.5))">✦</div>
  <div class="spin"></div>
  <div style="font-family:var(--mono);font-size:.7rem;color:var(--t3)">Loading your portal…</div>
</div>

<div class="app" id="app" style="display:none">
  <!-- ══ SIDEBAR ══ -->
  <aside class="sb" id="sb">
    <div class="sb-logo" style="padding:20px 16px 16px;border-bottom:1px solid var(--rim);display:flex;align-items:center;gap:10px;justify-content:space-between">
      <div class="nexus-logo"><span class="logo-star">✦</span><span class="logo-text">Nexus</span></div>
      <button class="sb-close" id="sb-x">✕</button>
    </div>

    <nav class="sb-nav" id="sb-nav">
      <span class="sb-section">Navigation</span>
      <button class="sbi on" data-id="home" onclick="goHome()">
        <span class="ic">🏠</span><span class="nm">Home</span>
      </button>
      <span class="sb-section" id="subj-section-lbl" style="display:none">My Subjects</span>
      <div id="sb-subjects"></div>
    </nav>

    <div class="sb-foot">
      <div class="acct-block">
        <div class="acct-top">
          <img class="acct-av" id="sb-av" src="" alt="" style="display:none"/>
          <div class="acct-av" id="sb-av-init" style="display:flex;align-items:center;justify-content:center;font-size:1rem;background:var(--goldA);color:var(--gold)">?</div>
          <div class="acct-info">
            <div class="acct-nm" id="sb-nm">—</div>
            <div class="acct-em" id="sb-em">—</div>
            <span class="acct-role" id="sb-role" style="display:none">Teacher</span>
          </div>
        </div>
        <div class="acct-btns">
          <button class="acct-btn" onclick="openAcctModal()">👤 Account</button>
          <button class="acct-btn red" onclick="doSignOut()">Sign Out</button>
        </div>
      </div>
    </div>
  </aside>

  <!-- ══ MAIN WRAP ══ -->
  <div class="mw">
    <!-- Topbar -->
    <header class="tb">
      <button class="tb-ham" id="tb-ham">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <button class="tb-back" id="tb-back" onclick="goBack()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="bc" id="bc"></div>
      <div class="tb-r" id="tb-r">
        <!-- Add button shown only for teachers inside their subject -->
        <button class="tb-btn-add" id="tb-add-btn" style="display:none" onclick="openSuggestModal()">+ Suggest File</button>
        <img class="tb-av" id="tb-av" src="" alt="" onclick="openAcctModal()" title="Account" style="display:none"/>
        <div class="acct-av" id="tb-av-init" style="width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;background:var(--goldA);color:var(--gold);cursor:pointer;border:1.5px solid rgba(232,201,107,.2)" onclick="openAcctModal()">?</div>
      </div>
    </header>

    <!-- Content -->
    <main class="ct"><div class="ct-in" id="ct-in"></div></main>
  </div>
</div>

<!-- ══ MODAL ══ -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal-box">
    <div class="modal-hd"><h2 id="modal-title">Modal</h2><button class="ib" onclick="closeModal()">✕</button></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- ══ VIEWER (all files open here — nothing leaves Nexus) ══ -->
<div class="viewer-mo" id="viewer-mo" style="display:none">
  <div class="viewer-tb">
    <button class="ib" onclick="closeViewer()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <span class="viewer-title" id="viewer-title">Document</span>
  </div>
  <div class="viewer-body">
    <div class="viewer-frame-wrap">
      <iframe id="viewer-frame" src="" allowfullscreen></iframe>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
/* ════════════════════════════════════════
   NEXUS USER DASHBOARD · by Aarav Sinha

   FIRESTORE RULES (paste in Firebase Console → Firestore → Rules):

   rules_version = '2';
   service cloud.firestore {
     match /databases/{database}/documents {
       match /users/{userId} {
         allow read, write: if request.auth != null && request.auth.uid == userId;
         allow read, write: if request.auth.token.email == "aaravhfs@gmail.com";
       }
       match /subjects/{docId} {
         allow read: if request.auth != null;
         allow write: if request.auth.token.email == "aaravhfs@gmail.com";
       }
       match /items/{docId} {
         allow read: if request.auth != null;
         allow create: if request.auth != null;
         allow update, delete: if request.auth.token.email == "aaravhfs@gmail.com";
       }
       match /config/{docId} {
         allow read: if request.auth != null;
         allow write: if request.auth.token.email == "aaravhfs@gmail.com";
       }
       match /accessRequests/{docId} {
         allow read, write: if request.auth != null;
       }
       match /annotations/{docId} {
         allow read, write: if request.auth != null;
       }
     }
   }
════════════════════════════════════════ */
const FC={apiKey:"AIzaSyCqEEBANVyt-ybQD8z-pys2V-07-lxEWjA",authDomain:"nexus-705ef.firebaseapp.com",projectId:"nexus-705ef",storageBucket:"nexus-705ef.firebasestorage.app",messagingSenderId:"982944171585",appId:"1:982944171585:web:de65b6827ca769565ba8c0"};
const ADMIN="aaravhfs@gmail.com";
const WA="919073121019";
const EMAIL="aaravhfs@gmail.com";
const MEET_URL="https://meet.google.com/qay-pdbx-aen";
const DEF_SCH={day:5,hour:20,minute:30,label:"Every Friday at 8:30 PM IST"};

if(!firebase.apps.length)firebase.initializeApp(FC);
const auth=firebase.auth(), db=firebase.firestore();
const $=id=>document.getElementById(id);

let currentUser=null, userData=null;
let path=[];           // [{id, name, type}]
let allSubjects=[];    // all subjects from DB
let userSubjects=[];   // subject IDs user has access to
let meetCfg={description:'',schedule:null,classActive:false};
let meetTimerId=null;
let homeTab='materials';

/* ════════ AUTH ════════ */
auth.onAuthStateChanged(async u=>{
  if(!u){window.location.href='index.html';return;}
  if(u.email===ADMIN){window.location.href='admin.html';return;}

  currentUser=u;

  try{
    const snap=await db.collection('users').doc(u.uid).get();
    if(!snap.exists){await auth.signOut();window.location.href='register.html';return;}
    const d=snap.data();
    if(d.status==='pending'){await auth.signOut();window.location.href='login.html?msg=pending';return;}
    if(d.status==='rejected'){await auth.signOut();window.location.href='login.html?msg=rejected';return;}
    userData=d;
    userSubjects=d.subjects||[];

    // Update last login
    db.collection('users').doc(u.uid).set({lastLogin:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}).catch(()=>{});

    // Set UI
    const name=d.displayName||u.displayName||u.email;
    const photo=d.photoURL||u.photoURL||'';
    $('sb-nm').textContent=name;
    $('sb-em').textContent=u.email;
    $('sb-role').textContent=d.role==='teacher'?'Teacher':'Student';
    $('sb-role').style.display='';
    if(photo){
      $('sb-av').src=photo; $('sb-av').style.display='';
      $('sb-av-init').style.display='none';
      $('tb-av').src=photo; $('tb-av').style.display='';
      $('tb-av-init').style.display='none';
    } else {
      $('sb-av-init').textContent=name.charAt(0).toUpperCase();
      $('tb-av-init').textContent=name.charAt(0).toUpperCase();
    }

    await loadMeetCfg();
    await loadAllSubjects();
    $('loader').classList.add('hide');
    setTimeout(()=>{$('loader').style.display='none';}，300);
    $('app').style.display='flex';
    navigate([]);

  }catch(e){
    console.error(e);
    $('loader').style.display='none';
    toast(e.message,'err');
  }
});

/* ════════ MEET CONFIG ════════ */
async function loadMeetCfg(){
  try{const d=await db.collection('config').doc('meet').get();if(d.exists)meetCfg={...meetCfg,...d.data()};}catch(e){}
}

/* ════════ SUBJECTS ════════ */
async function loadAllSubjects(){
  try{
    const snap=await db.collection('subjects').orderBy('order').get();
    allSubjects=[];snap.forEach(d=>allSubjects.push({id:d.id,...d.data()}));
    renderSidebar();
  }catch(e){console.warn('subjects:',e.message);}
}

function renderSidebar(){
  const mySubjs=allSubjects.filter(s=>userSubjects.includes(s.id));
  if(mySubjs.length===0){
    $('subj-section-lbl').style.display='none';
    $('sb-subjects').innerHTML=`<div style="padding:10px 12px;font-size:.76rem;color:var(--t3)">No subjects assigned yet.</div>`;
    return;
  }
  $('subj-section-lbl').style.display='';
  $('sb-subjects').innerHTML=mySubjs.map(s=>`
    <button class="sbi" data-id="${s.id}" onclick="navToSubject('${s.id}','${esc(s.name).replace(/'/g,"\\'")}')">
      <span class="ic">${s.emoji||'📚'}</span>
      <span class="nm">${esc(s.name)}</span>
    </button>`).join('');
}

/* ════════ NAVIGATION ════════ */
function navigate(p){
  path=p;
  renderBC();
  renderContent();
  // sync sidebar highlight
  const curId=p.length?p[0].id:null;
  document.querySelectorAll('.sbi').forEach(el=>el.classList.toggle('on',el.dataset.id===curId||(el.dataset.id==='home'&&!curId)));
  // Show "Suggest File" button only when inside a chapter
  const inChapter=p.length>0&&p[p.length-1].type==='chapter';
  $('tb-add-btn').style.display=inChapter?'flex':'none';
}

function goHome(){navigate([]);}
function goBack(){if(path.length>0)navigate(path.slice(0,-1));}

function navToSubject(id,name){
  navigate([{id,name,type:'subject'}]);
}

function renderBC(){
  $('tb-back').classList.toggle('show',path.length>0);
  let h=`<span class="bcc ${!path.length?'on':''}" onclick="navigate([])">Home</span>`;
  path.forEach((s,i)=>{
    h+=`<span class="bcs">›</span><span class="bcc ${i===path.length-1?'on':''}" onclick="navigate(path.slice(0,${i+1}))">${esc(s.name)}</span>`;
  });
  $('bc').innerHTML=h;
}

/* ════════ HOME TABS ════════ */
function setTab(t){homeTab=t;renderContent();}

/* ════════ MAIN CONTENT RENDERER ════════ */
async function renderContent(){
  $('ct-in').innerHTML=`<div style="display:flex;align-items:center;gap:10px;color:var(--t2);padding:48px 0"><div class="spin"></div><span>Loading…</span></div>`;

  // If inside a chapter → chapter view
  if(path.length>0&&path[path.length-1].type==='chapter'){
    await renderChapterView(path[path.length-1]);
    return;
  }

  // If we have a path → folder/subject contents
  if(path.length>0){
    await renderFolderView(path[path.length-1]);
    return;
  }

  // HOME
  await renderHome();
}

/* ── HOME ── */
async function renderHome(){
  const first=(userData?.displayName||currentUser.displayName||'').split(' ')[0]||'there';
  let h=`<div class="hero">
    <div class="hero-eye">Your Study Portal</div>
    <h2>Welcome back, <em>${esc(first)}</em> ✦</h2>
    <p class="hero-sub">Your organised space for textbooks, class notes, recordings and live sessions.</p>
  </div>`;

  // Tabs
  h+=`<div class="htabs">
    <button class="htab ${homeTab==='materials'?'on':''}" onclick="setTab('materials')">📚 My Subjects</button>
    <button class="htab ${homeTab==='meet'?'on':''}" onclick="setTab('meet')">📹 Join Class</button>
    <button class="htab ${homeTab==='suggest'?'on':''}" onclick="setTab('suggest')">📤 Suggest File</button>
    <button class="htab ${homeTab==='contact'?'on':''}" onclick="setTab('contact')">💬 Support</button>
  </div>`;

  if(homeTab==='meet'){
    h+=buildMeetCard();
    h+=`<div class="credits">Developed by <b>Aarav Sinha</b> · Nexus Study Portal</div>`;
    $('ct-in').innerHTML=h;
    startMeetTimer();
    return;
  }
  if(homeTab==='contact'){
    h+=buildContactCard();
    h+=`<div class="credits">Developed by <b>Aarav Sinha</b> · Nexus Study Portal</div>`;
    $('ct-in').innerHTML=h;
    return;
  }
  if(homeTab==='suggest'){
    h+=buildSuggestCard();
    h+=`<div class="credits">Developed by <b>Aarav Sinha</b> · Nexus Study Portal</div>`;
    $('ct-in').innerHTML=h;
    return;
  }

  // MATERIALS tab — show all subjects (locked/unlocked)
  if(!allSubjects.length){
    h+=`<div class="empty-state"><span class="ic">📭</span><p>No subjects have been added yet.</p></div>`;
  } else {
    h+=`<div class="sec-row"><span class="sec-lbl">All Subjects</span><span class="sec-cnt">${allSubjects.length}</span></div>`;
    h+=`<div class="grid">`;
    allSubjects.forEach((s,i)=>{
      const hasAccess=userSubjects.includes(s.id);
      const delay=`animation-delay:${i*.04}s`;
      if(hasAccess){
        h+=`<div class="card" style="${delay}" onclick="navToSubject('${s.id}','${esc(s.name).replace(/'/g,"\\'")}')">
          <div class="card-ic">${s.emoji||'📚'}</div>
          <div class="card-nm">${esc(s.name)}</div>

async function renderFolderView(cur){
  try{
    const snap=await db.collection('items')
      .where('parentId','==',cur.id)
      .where('status','==','approved')
      .get();
    const items=[];
    snap.forEach(d=>items.push({id:d.id,...d.data()}));
    items.sort((a,b)=>(a.createdAt?.toMillis?.()||0)-(b.createdAt?.toMillis?.()||0));

    let h=`<div class="ph">
      <div><div class="ph-t">${esc(cur.name)}</div>
      <div class="ph-s">${items.length} item${items.length!==1?'s':''}</div></div>
    </div>`;

    if(!items.length){

      h+=`<div class="sec-row"><span class="sec-lbl">Contents</span><span class="sec-cnt">${items.length}</span></div>`;
      h+=`<div class="grid">`;
      items.forEach((item,i)=>{
        const delay=`animation-delay:${i*.04}s`;
        const isNav=['folder','subject','chapter'].includes(item.type);
        const onClick=isNav
          ?`navigate([...path,{id:'${item.id}',name:'${esc(item.name).replace(/'/g,"\\'")}',type:'${item.type}'}])`
          :`openViewer('${(item.url||'').replace(/'/g,"\\'")}','${esc(item.name).replace(/'/g,"\\'")}')`;

          <div class="card-ic">${icon(item.type,item.emoji)}</div>
          <div class="card-nm">${esc(item.name)}</div>

  }
}

/* ── CHAPTER VIEW ── */
async function renderChapterView(chapter){

function buildFileSection(label,items){
  let h=`<div class="sec-row" style="margin-top:16px"><span class="sec-lbl">${label}</span><span class="sec-cnt">${items.length}</span></div>`;

    return h+`<div class="empty-state" style="padding:16px 0 20px"><span class="ic" style="font-size:1.4rem">📭</span><p>Nothing here yet.</p></div>`;

function buildNotesSection(items){
  let h=`<div class="sec-row"><span class="sec-lbl">Notes</span><span class="sec-cnt">${items.length}</span></div>`;

/* ════════ MEET CARD ════════ */
function getSchedule(){return meetCfg.schedule||DEF_SCH;}
function getMeetState(){
  const ist=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Kolkata'}));
  const sch=getSchedule();
  const mins=ist.getHours()*60+ist.getMinutes();
  const cs=sch.hour*60+sch.minute, ce=cs+120, jw=cs-15;
  if(ist.getDay()===sch.day&&mins>=cs&&mins<ce) return 'live';
  if(ist.getDay()===sch.day&&mins>=jw&&mins<cs) return 'soon';
  return 'scheduled';
}
function getNextClassDate(){
  const sch=getSchedule();
  const ist=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Kolkata'}));
  let d=(sch.day-ist.getDay()+7)%7;
  if(d===0&&ist.getHours()*60+ist.getMinutes()>=sch.hour*60+sch.minute+120)d=7;
  const n=new Date(ist);n.setDate(ist.getDate()+d);n.setHours(sch.hour,sch.minute,0,0);return n;
}

function buildMeetCard(){
  const state=getMeetState();
  const sch=getSchedule();
  const nxt=getNextClassDate();
  const nxtStr=nxt.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'})+' · '+nxt.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})+' IST';
  let liveBadge='', rightHTML='';
  if(state==='live'){
    liveBadge=`<div class="ldot"></div><span class="ltxt">Live Now</span>`;
    rightHTML=`<button class="btn-join" onclick="window.open('${MEET_URL}','_blank')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 10l4.553-2.069A1 1 0 0 1 21 8.82v6.36a1 1 0 0 1-1.447.889L15 14"/><rect x="3" y="6" width="12" height="12" rx="2"/></svg>
      Join Now</button>`;
  } else if(state==='soon'){
    liveBadge=`<div class="ldot"></div><span class="ltxt">Starting Soon</span>`;
    rightHTML=`<button class="btn-join" onclick="window.open('${MEET_URL}','_blank')">Join Now</button><div class="cd-txt" id="meet-cd"></div>`;
  } else {
    rightHTML=`<button class="btn-join soon" disabled>Scheduled</button><div class="cd-txt" id="meet-cd">${nxtStr}</div>`;
  }
  const descBox=meetCfg.description?`<div class="meet-desc-box">📋 ${esc(meetCfg.description)}</div>`:'';
  return `<div class="meet-card"><div class="meet-row">
    <div class="meet-col"><div class="meet-logo">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M15 10l4.553-2.069A1 1 0 0 1 21 8.82v6.36a1 1 0 0 1-1.447.889L15 14M3 8a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8z" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div></div>
    <div class="meet-body">
      <div class="meet-toprow">${liveBadge}<span class="meet-chip">Google Meet</span></div>
      <div class="meet-title">Live Class</div>
      <div class="meet-timerow"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${esc(sch.label||DEF_SCH.label)}</div>
      ${descBox}
    </div>
    <div class="meet-right">${rightHTML}</div>
  </div></div>`;
}

function startMeetTimer(){
  if(meetTimerId){clearInterval(meetTimerId);meetTimerId=null;}
  const state=getMeetState();
  if(state==='soon'){
    meetTimerId=setInterval(()=>{
      const ist=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Kolkata'}));
      const sch=getSchedule();
      const rem=(sch.hour*60+sch.minute-(ist.getHours()*60+ist.getMinutes()))*60-ist.getSeconds();
      if(rem<=0){clearInterval(meetTimerId);renderContent();return;}
      const el=$('meet-cd');if(el)el.textContent=`Starts in ${Math.floor(rem/60)}m ${rem%60}s`;
    },1000);
  } else if(state==='scheduled'){
    meetTimerId=setInterval(()=>{
      const diff=getNextClassDate()-Date.now();
      if(diff<=0){clearInterval(meetTimerId);renderContent();return;}
      const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000);
      const el=$('meet-cd');if(el)el.textContent=d>0?`${d}d ${h}h away`:`${h}h ${m}m away`;
    },30000);
  }
}

async function submitSuggestion(){

      name,type,description:desc,

    </div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>

    </div>`;
  $('modal').style.display='flex';
}

async function sendAccessRequest(subjectId,subjectName){
  const msg=$('ra-msg').value.trim();
  try{
    // Check if already requested
    const existing=await db.collection('accessRequests')
      .where('userId','==',currentUser.uid)
      .where('subjectId','==',subjectId)
      .where('status','==','pending')
      .get();
    if(!existing.empty){toast('You already have a pending request for this subject.','err');return;}
    await db.collection('accessRequests').add({
      userId:currentUser.uid,
      userEmail:currentUser.email,
      userName:userData?.displayName||currentUser.displayName||currentUser.email,
      subjectId,subjectName,message:msg,
      status:'pending',
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    closeModal();toast('Access request sent! Admin will review it.','ok');
  }catch(e){toast('Error: '+e.message,'err');console.error(e);}
}

  }catch(e){toast('Error: '+e.message,'err');}
}

/* ════════ VIEWER (everything opens in-app) ════════ */
function openViewer(url,name){
  if(!url){toast('No URL set for this file.','err');return;}
  $('viewer-title').textContent=name;
  $('viewer-frame').src=gdriveEmbed(url);
  $('viewer-mo').style.display='flex';
}
function closeViewer(){
  $('viewer-mo').style.display='none';
  $('viewer-frame').src='';
}

/* ════════ SIGN OUT ════════ */
function doSignOut(){
  if(meetTimerId){clearInterval(meetTimerId);meetTimerId=null;}
  auth.signOut().then(()=>window.location.href='index.html');
}

/* ════════ MODAL ════════ */
function closeModal(){$('modal').style.display='none';}
$('modal').addEventListener('click',e=>{if(e.target===$('modal'))closeModal();});

/* ════════ HELPERS ════════ */
function gdriveEmbed(url){
  if(!url)return'';
  const m=url.match(/\/file\/d\/([^/?\\s]+)/);if(m)return`https://drive.google.com/file/d/${m[1]}/preview`;
  const m2=url.match(/[?&]id=([^&\s]+)/);if(m2)return`https://drive.google.com/file/d/${m2[1]}/preview`;
  return url;
}
function fmtDate(ts){if(!ts)return'';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}
function icon(t,e){if(e)return e;return{folder:'📁',subject:'📚',chapter:'📖',pdf:'📄',studymaterial:'📝',link:'🔗',recording:'🎬',note:'📋',book:'📚'}[t]||'📁';}
function chipLbl(t){return{folder:'Folder',subject:'Subject',chapter:'Chapter',pdf:'PDF',studymaterial:'Study Mat.',link:'Link',recording:'Recording',note:'Note',book:'Book'}[t]||t;}
function chipCls(t){const m={pdf:'chip-rose',studymaterial:'chip-teal',recording:'chip-sage',note:'chip-gold',link:'chip-lilac',folder:'chip-lilac',subject:'chip-gold',chapter:'chip-sage'};return m[t]||'chip-lilac';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function toast(msg,type){
  const t=$('toast');t.textContent=msg;
  t.className='toast show'+(type==='ok'?' ok':type==='err'?' err':'');
  clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),3400);
}

window.navigate=navigate;window.goHome=goHome;window.goBack=goBack;
