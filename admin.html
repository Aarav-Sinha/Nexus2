<style>
body{overflow:hidden;height:100vh}
.app{display:flex;height:100vh;position:relative;z-index:1}
.sb-admin-sub{font-size:.55rem;font-family:var(--mono);letter-spacing:.08em;color:var(--gold);opacity:.6;margin-top:2px}
.sb-foot-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.sb-foot-btn{padding:8px 6px;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:var(--t2);font-size:.71rem;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;font-family:var(--sans)}
.sb-foot-btn:hover{background:var(--glass2);color:var(--t0)}
.sb-foot-btn.danger:hover{color:var(--rose);border-color:rgba(192,99,90,.25)}
.admin-av-wrap{width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(201,168,76,.3);background:var(--goldBG2);color:var(--gold);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:.95rem;font-weight:700;overflow:hidden;flex-shrink:0}
.admin-av-wrap img{width:100%;height:100%;object-fit:cover}

/* MEET CARD */
.meet-card-admin{background:var(--glass);border:1px solid var(--border);border-radius:var(--r2);padding:20px 22px;margin-bottom:14px;transition:border-color .2s}
.meet-card-admin:hover{border-color:var(--borderH)}
.mca-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.mca-info{flex:1;min-width:0}
.mca-title{font-size:.94rem;font-weight:600;color:var(--t0);margin-bottom:3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.mca-code{font-size:.6rem;font-family:var(--mono);color:var(--gold);background:var(--goldBG);border:1px solid var(--borderH);border-radius:5px;padding:1px 7px;letter-spacing:.06em}
.mca-url{font-size:.72rem;font-family:var(--mono);color:var(--sky);word-break:break-all;line-height:1.4;margin-bottom:4px}
.mca-sched{font-size:.69rem;color:var(--t2);margin-bottom:4px;display:flex;align-items:center;gap:5px}
.mca-status{display:inline-flex;align-items:center;gap:6px;font-size:.7rem;font-family:var(--mono);letter-spacing:.06em;padding:3px 10px;border-radius:99px;text-transform:uppercase}
.mca-status.inactive{background:rgba(255,255,255,.05);color:var(--t3);border:1px solid var(--border)}
.mca-status.soon-st{background:rgba(201,168,76,.1);color:var(--gold);border:1px solid var(--borderH)}
.mca-status.live-st{background:rgba(107,158,122,.12);color:var(--sage);border:1px solid rgba(107,158,122,.25)}
.mca-status .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.mca-status.inactive .dot{background:var(--t3)}
.mca-status.soon-st .dot{background:var(--gold);animation:lpulse 2s ease infinite}
.mca-status.live-st .dot{background:var(--sage);animation:lpulse 2s ease infinite}
@keyframes lpulse{0%,100%{box-shadow:0 0 0 2px rgba(107,158,122,.2)}50%{box-shadow:0 0 0 5px rgba(107,158,122,.08)}}
.mca-extra{font-size:.69rem;color:var(--t2);font-family:var(--mono);margin-top:4px}
.mca-btns{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}

/* Stree */
.stree-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--glass);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;cursor:pointer;transition:all .18s}
.stree-item:hover{border-color:var(--borderH);background:rgba(201,168,76,.04)}
.stree-item-icon{width:32px;height:32px;border-radius:8px;background:var(--glass2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stree-item-icon svg{color:var(--t1)}
.stree-item-info{flex:1;min-width:0}
.stree-item-name{font-size:.85rem;font-weight:500;color:var(--t0)}
.stree-item-meta{font-size:.62rem;color:var(--t3);font-family:var(--mono);margin-top:2px}
.stree-item-acts{display:flex;gap:5px;flex-shrink:0}
.cm-bc{display:flex;align-items:center;gap:6px;flex:1;flex-wrap:wrap}
.cm-bc-item{font-size:.78rem;color:var(--t2);cursor:pointer;padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:transparent;transition:all .15s;font-family:var(--sans)}
.cm-bc-item:hover,.cm-bc-item.on{color:var(--gold);border-color:var(--borderH);background:var(--goldBG)}
.cm-bc-sep{color:var(--t3);font-size:.65rem}

/* User status */
.us-chip{font-size:.58rem;font-family:var(--mono);letter-spacing:.06em;padding:2px 7px;border-radius:99px;text-transform:uppercase;font-weight:600}
.us-a{background:rgba(107,158,122,.12);color:var(--sage)}
.us-p{background:rgba(192,99,90,.12);color:var(--rose)}
.us-r{background:rgba(255,255,255,.06);color:var(--t2)}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
/* ═══════════════════════════════════════
   NEXUS ADMIN · by Aarav Sinha

   MEET STATE STORED ON SUBJECT DOC:
   meetState: 'inactive' | 'soon' | 'live'
   meetStateSetAt: Timestamp  (when state was last changed)
   meetDuration: number (minutes, for live class)
   meetAutoEndAt: Timestamp   (computed: live start + duration)
   meetLink: string
   meetSchedule: string (display label)
   meetDay/Hour/Minute: recurring schedule
═══════════════════════════════════════ */
const FC={apiKey:"AIzaSyCqEEBANVyt-ybQD8z-pys2V-07-lxEWjA",authDomain:"nexus-705ef.firebaseapp.com",projectId:"nexus-705ef",storageBucket:"nexus-705ef.firebasestorage.app",messagingSenderId:"982944171585",appId:"1:982944171585:web:de65b6827ca769565ba8c0"};
const ADMIN="aaravhfs@gmail.com";
if(!firebase.apps.length)firebase.initializeApp(FC);
const auth=firebase.auth(),db=firebase.firestore();
const $=id=>document.getElementById(id);
let AU=null,panel='overview',cPath=[],meetListeners={};

/* ICONS */
const IC={
  book:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`,
  folder:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`,
  chapter:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`,
  pdf:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,
  study:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,
  video:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>`,
  note:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="12" y1="17" x2="8" y2="17"/></svg>`,
  link:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`,
  clock:`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  plus:`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
};
function tIcon(t){return{folder:IC.folder,subject:IC.book,chapter:IC.chapter,pdf:IC.pdf,studymaterial:IC.study,recording:IC.video,note:IC.note,link:IC.link}[t]||IC.folder;}
function tChip(t){return{pdf:'cr',studymaterial:'ck',recording:'cs',note:'cg',link:'cd',folder:'cd',subject:'cg',chapter:'cs'}[t]||'cd';}
function tLbl(t){return{folder:'Folder',subject:'Subject',chapter:'Chapter',pdf:'PDF',studymaterial:'Study Mat.',link:'Link',recording:'Recording',note:'Note'}[t]||t;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtD(ts){if(!ts)return'—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}
function fmtDT(ts){if(!ts)return'—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});}
function gdEmbed(url){if(!url)return'';const m=url.match(/\/file\/d\/([^/?\\s]+)/);if(m)return`https://drive.google.com/file/d/${m[1]}/preview`;return url;}
function toast(m,t){const el=$('toast');el.textContent=m;el.className='toast show'+(t==='ok'?' ok':t==='err'?' err':'');clearTimeout(window._tt);window._tt=setTimeout(()=>el.classList.remove('show'),3400);}
function ld(){return`<div class="loading"><div class="spin"></div><span>Loading…</span></div>`;}

/* ── EFFECTIVE MEET STATE ──
   Reads meetState + meetAutoEndAt to compute current state.
   If state is 'live' and now > meetAutoEndAt → treat as 'inactive'.
   If state is 'soon' and now > soonStartAt + 15min → treat as 'inactive' (expired).
*/
function effectiveMeetState(s){
  const st=s.meetState||'inactive';
  const now=Date.now();
  if(st==='live'){
    if(s.meetAutoEndAt){
      const endMs=s.meetAutoEndAt.toMillis?s.meetAutoEndAt.toMillis():Number(s.meetAutoEndAt);
      if(now>=endMs)return'inactive';
    }
    return'live';
  }
  if(st==='soon'){
    // soon expires after 15 minutes if no manual change
    if(s.meetStateSetAt){
      const setMs=s.meetStateSetAt.toMillis?s.meetStateSetAt.toMillis():Number(s.meetStateSetAt);
      if(now>=setMs+15*60*1000)return'inactive';
    }
    return'soon';
  }
  return'inactive';
}
function meetStateLabel(st){
  if(st==='live')return'Live Now';
  if(st==='soon')return'Starting Soon';
  return'Inactive';
}
function meetStateClass(st){
  if(st==='live')return'live-st';
  if(st==='soon')return'soon-st';
  return'inactive';
}

/* ── AUTH ── */
auth.onAuthStateChanged(u=>{
  if(!u||u.email!==ADMIN){window.location.href='index.html';return;}
  AU=u;
  if(u.photoURL)$('adm-av').innerHTML=`<img src="${u.photoURL}" alt=""/>`;
  goPanel('overview');loadBadges();
});
function doSignOut(){
  // Unsubscribe all meet listeners
  Object.values(meetListeners).forEach(unsub=>unsub());
  meetListeners={};
  auth.signOut().then(()=>window.location.href='index.html');
}

async function loadBadges(){
  try{
    const [pu,pr]=await Promise.all([db.collection('users').where('status','==','pending').get(),db.collection('items').where('status','==','pending').get()]);
    $('badge-u').textContent=pu.size;$('badge-u').style.display=pu.size>0?'':'none';
    $('badge-r').textContent=pr.size;$('badge-r').style.display=pr.size>0?'':'none';
  }catch(e){}
}

/* ── PANEL SWITCH ── */
const TITLES={overview:'Overview',users:'User Management',subjects:'Subjects & Content',meet:'Meet Settings',requests:'File Requests'};
function goPanel(p){
  panel=p; cPath=[];
  // Unsubscribe meet listeners when leaving meet panel
  if(p!=='meet'){Object.values(meetListeners).forEach(u=>u());meetListeners={};}
  document.querySelectorAll('.sbi').forEach(b=>b.classList.toggle('on',b.dataset.p===p));
  $('tb-title').textContent=TITLES[p]||p;
  $('tb-add').style.display=p==='subjects'?'flex':'none';
  ({overview:renderOverview,users:renderUsers,subjects:renderSubjects,meet:renderMeet,requests:renderRequests}[p]||renderOverview)();
}
function handleAdd(){if(panel==='subjects')openAddSubject();}

/* ══════════════ OVERVIEW ══════════════ */
async function renderOverview(){
  $('ct').innerHTML=ld();
  try{
    const [us,sj,it,pu,pi]=await Promise.all([db.collection('users').get(),db.collection('subjects').get(),db.collection('items').where('status','==','approved').get(),db.collection('users').where('status','==','pending').get(),db.collection('items').where('status','==','pending').get()]);
    let h=`<div class="hero"><div class="hero-eyebrow">Welcome back</div><h2>Good day, Aarav</h2><p class="hero-sub">Your Nexus portal at a glance.</p></div>`;
    h+=`<div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${us.size}</div><div class="stat-lbl">Users</div></div>
      <div class="stat-card"><div class="stat-val">${sj.size}</div><div class="stat-lbl">Subjects</div></div>

async function renderUsers(){
  $('ct').innerHTML=ld();
  try{
    const snap=await db.collection('users').orderBy('createdAt','desc').get();
    const pend=[],appr=[],rej=[];
    snap.forEach(d=>{const u={id:d.id,...d.data()};if(u.status==='pending')pend.push(u);else if(u.status==='rejected')rej.push(u);else appr.push(u);});
    let h='';
    if(pend.length){h+=`<div class="sec-row"><span class="sec-lbl">Pending</span><span class="sec-cnt">${pend.length}</span></div>`;pend.forEach(u=>h+=userRow(u,true));h+=`<div style="height:18px"></div>`;}

            <div class="stree-item-meta"><span style="color:var(--gold);background:var(--goldBG);border-radius:4px;padding:0 5px;font-size:.59rem;letter-spacing:.06em">${esc(s.code||s.id)}</span>${s.description?` · ${esc(s.description)}`:''}</div>

    } else {
      const isChapter=cur.type==='chapter';

function openAddSubject(){
  $('mo-title').textContent='New Subject';

    <div class="fpair">

}
async function saveNewSubject(){
  const name=$('sn').value.trim(),code=$('sc').value.trim(),desc=$('sd').value.trim();
  if(!name){toast('Name required.','err');return;}
  if(!code){toast('Code required.','err');return;}
  if(!/^[A-Z0-9_]+$/.test(code)){toast('Code: letters/numbers/underscore only.','err');return;}
  const ex=await db.collection('subjects').doc(code).get();
  if(ex.exists){toast('Code already exists.','err');return;}
  try{
    const cnt=(await db.collection('subjects').get()).size;
    await db.collection('subjects').doc(code).set({name,code,description:desc,order:cnt,meetLink:'',meetSchedule:'',meetDay:5,meetHour:20,meetMinute:30,meetState:'inactive',meetStateSetAt:null,meetAutoEndAt:null,meetDuration:90,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    closeMo();toast('Subject created!','ok');renderSubjects();
  }catch(e){toast(e.message,'err');}
}

async function deleteSubject(id){
  if(!confirm(`Delete subject "${id}" and ALL its content? Cannot be undone.`))return;
  try{
    const snap=await db.collection('items').where('subjectId','==',id).get();

    await db.collection('subjects').doc(id).delete();

  }catch(e){toast(e.message,'err');}

async function saveItem(subjectId,parentId){

async function updateItem(id){
  const nm=$('ei-n').value.trim(),url=$('ei-u').value.trim(),content=$('ei-c').value.trim(),desc=$('ei-d').value.trim(),status=$('ei-s').value;
  if(!nm){toast('Name required.','err');return;}
  try{
    const data={name:nm,description:desc,content,status,updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
    if(url)data.url=gdEmbed(url);
    await db.collection('items').doc(id).update(data);
    closeMo();toast('Updated!','ok');renderContentLevel();
  }catch(e){toast(e.message,'err');}
}
async function approveItem(id){
  try{await db.collection('items').doc(id).update({status:'approved',approvedBy:AU.email,approvedAt:firebase.firestore.FieldValue.serverTimestamp()});toast('Approved!','ok');renderContentLevel();loadBadges();}catch(e){toast(e.message,'err');}
}
async function deleteItem(id){
  if(!confirm('Delete this item?'))return;
  try{await delRec(id);toast('Deleted.');renderContentLevel();}catch(e){toast(e.message,'err');}
}
async function delRec(id){const snap=await db.collection('items').where('parentId','==',id).get();for(const d of snap.docs)await delRec(d.id);await db.collection('items').doc(id).delete();}

/* ══════════════════════════════════════════
   MEET SETTINGS PANEL — Real-time listeners
   State stored on /subjects/{id}:
     meetState: 'inactive'|'soon'|'live'
     meetStateSetAt: server timestamp
     meetAutoEndAt: server timestamp (for live)
     meetDuration: minutes
     meetLink, meetSchedule, meetDay/Hour/Minute
══════════════════════════════════════════ */
async function renderMeet(){
  $('ct').innerHTML=ld();
  try{
    const snap=await db.collection('subjects').orderBy('order').get();
    if(snap.empty){$('ct').innerHTML=`<div class="empty"><p>No subjects yet. Create subjects first.</p></div>`;return;}
    let h=`<div class="info-box blue" style="margin-bottom:20px"><strong>Per-Subject Meet Links.</strong> Each subject has its own Google Meet link, schedule and live state. Changes sync immediately to all users.</div>`;
    snap.forEach(d=>{
      const s={id:d.id,...d.data()};
      h+=`<div class="meet-card-admin" id="mca-${s.id}">${buildMeetCard(s)}</div>`;
    });
    h+=`<div class="credits">Developed by <strong>Aarav Sinha</strong> · Nexus Admin</div>`;
    $('ct').innerHTML=h;
    // Subscribe real-time listeners for each subject
    snap.forEach(d=>{
      const id=d.id;
      if(meetListeners[id])meetListeners[id](); // unsubscribe existing
      meetListeners[id]=db.collection('subjects').doc(id).onSnapshot(doc=>{
        const el=$(`mca-${id}`);
        if(el&&doc.exists)el.innerHTML=buildMeetCard({id:doc.id,...doc.data()});
      });
    });
  }catch(e){$('ct').innerHTML=`<div class="empty"><p>${e.message}</p></div>`;}
}

function buildMeetCard(s){
  const st=effectiveMeetState(s);
  const stCls=meetStateClass(st);
  const stLbl=meetStateLabel(st);
  const now=Date.now();
  let extraInfo='';
  if(st==='live'&&s.meetAutoEndAt){
    const endMs=s.meetAutoEndAt.toMillis?s.meetAutoEndAt.toMillis():Number(s.meetAutoEndAt);
    const rem=Math.max(0,Math.ceil((endMs-now)/60000));
    extraInfo=`<div class="mca-extra">Auto-ends in ${rem} min · ${new Date(endMs).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</div>`;
  }
  if(st==='soon'&&s.meetStateSetAt){
    const setMs=s.meetStateSetAt.toMillis?s.meetStateSetAt.toMillis():Number(s.meetStateSetAt);
    const expMs=setMs+15*60*1000;
    const rem=Math.max(0,Math.ceil((expMs-now)/60000));
    extraInfo=`<div class="mca-extra">Starting soon — expires in ${rem} min</div>`;
  }
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dayLbl=days[s.meetDay??5];
  const timeLbl=`${String(s.meetHour??20).padStart(2,'0')}:${String(s.meetMinute??30).padStart(2,'0')} IST`;
  return `
    <div class="mca-head">
      <div class="mca-info">
        <div class="mca-title">
          ${esc(s.name)}
          <span class="mca-code">${esc(s.code||s.id)}</span>
        </div>
        ${s.meetLink?`<div class="mca-url">${esc(s.meetLink)}</div>`:`<div class="mca-url" style="color:var(--t3)">No meet link configured</div>`}
        <div class="mca-sched">${IC.clock} ${s.meetSchedule||`${dayLbl} ${timeLbl}`}</div>
        ${extraInfo}
      </div>
      <div>
        <span class="mca-status ${stCls}"><span class="dot"></span>${stLbl}</span>
      </div>
    </div>
    <div class="mca-btns">
      ${st==='inactive'?`
        <button class="btn btn-ok btn-sm" onclick="startClass('${s.id}')">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Start Class
        </button>
        <button class="btn btn-gold btn-sm" onclick="markStartingSoon('${s.id}')">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Starting Soon
        </button>`:''}
      ${st==='soon'?`
        <button class="btn btn-ok btn-sm" onclick="startClass('${s.id}')">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Go Live Now
        </button>
        <button class="btn btn-danger btn-sm" onclick="endClass('${s.id}')">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>
          Cancel
        </button>`:''}
      ${st==='live'?`
        <button class="btn btn-danger btn-sm" onclick="endClass('${s.id}')">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>
          End Class
        </button>`:''}
      <button class="btn btn-sky btn-sm" onclick="openMeetConfig('${s.id}')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Configure
      </button>
      ${s.meetLink?`<a href="${esc(s.meetLink)}" target="_blank" class="btn btn-ghost btn-sm">Open Meet</a>`:''}
    </div>`;
}

/* Meet state actions — write directly to Firestore; onSnapshot updates UI */
async function startClass(id){
  $('mo-title').textContent='Start Class';
  $('mo-body').innerHTML=`
    <div class="info-box blue">Class will go <strong>Live</strong> immediately. Students will see the Join button.</div>
    <div class="fg"><label>Duration (minutes)</label>
      <input class="fi" type="number" id="dur" value="90" min="15" max="480" placeholder="90"/>
      <span class="fi-hint">Class will automatically stop showing as Live after this duration.</span>
    </div>
    <div class="mc-ft"><button class="btn btn-ghost" onclick="closeMo()">Cancel</button><button class="btn btn-ok" onclick="confirmStartClass('${id}')">Start Class</button></div>`;
  openMo();
}
async function confirmStartClass(id){
  const dur=parseInt($('dur').value)||90;
  const now=firebase.firestore.FieldValue.serverTimestamp();
  const autoEndAt=new Date(Date.now()+dur*60*1000);
  try{
    await db.collection('subjects').doc(id).update({
      meetState:'live',
      meetStateSetAt:now,
      meetDuration:dur,
      meetAutoEndAt:firebase.firestore.Timestamp.fromDate(autoEndAt)
    });
    closeMo();toast('Class started! Students can now join.','ok');
  }catch(e){toast(e.message,'err');}
}
async function markStartingSoon(id){
  try{
    await db.collection('subjects').doc(id).update({
      meetState:'soon',
      meetStateSetAt:firebase.firestore.FieldValue.serverTimestamp(),
      meetAutoEndAt:null
    });
    toast('Marked as "Starting Soon" — auto-expires in 15 min.','ok');
  }catch(e){toast(e.message,'err');}
}
async function endClass(id){
  try{
    await db.collection('subjects').doc(id).update({
      meetState:'inactive',
      meetStateSetAt:firebase.firestore.FieldValue.serverTimestamp(),
      meetAutoEndAt:null
    });
    toast('Class ended.','ok');
  }catch(e){toast(e.message,'err');}
}

/* Meet configuration modal */
function openMeetConfig(id){
  db.collection('subjects').doc(id).get().then(d=>{
    const s={id:d.id,...d.data()};
    const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    $('mo-title').textContent=`Meet Config — ${esc(s.name)}`;
    $('mo-body').innerHTML=`
      <div class="fi-tag">Subject: ${esc(s.code||s.id)} — This link is only for this subject</div>
      <div class="fg"><label>Google Meet URL</label>
        <input class="fi" id="ml" value="${esc(s.meetLink||'')}" placeholder="https://meet.google.com/xxx-xxxx-xxx"/>
      </div>
      <div class="fg"><label>Schedule Label (shown to students)</label>
        <input class="fi" id="ms" value="${esc(s.meetSchedule||'')}" placeholder="e.g. Every Friday at 8:30 PM IST"/>
      </div>
      <div class="fpair">
        <div class="fg"><label>Recurring Day</label>
          <select class="fsel" id="md">${days.map((d,i)=>`<option value="${i}" ${(s.meetDay??5)==i?'selected':''}>${d}</option>`).join('')}</select>
        </div>
        <div class="fg"><label>Recurring Time (IST)</label>
          <input class="fi" type="time" id="mt" value="${String(s.meetHour??20).padStart(2,'0')}:${String(s.meetMinute??30).padStart(2,'0')}"/>
        </div>
      </div>
      <div class="fg"><label>Default Duration (minutes)</label>
        <input class="fi" type="number" id="mdur" value="${s.meetDuration||90}" min="15" max="480"/>
        <span class="fi-hint">Used as default when you click "Start Class".</span>
      </div>
      <div class="mc-ft"><button class="btn btn-ghost" onclick="closeMo()">Cancel</button><button class="btn btn-gold" onclick="saveMeetConfig('${id}')">Save Config</button></div>`;
    openMo();
  }).catch(e=>toast(e.message,'err'));
}
async function saveMeetConfig(id){
  const link=$('ml').value.trim(),sched=$('ms').value.trim();
  const tp=$('mt').value.split(':'),hour=parseInt(tp[0]),minute=parseInt(tp[1]),day=parseInt($('md').value);
  const dur=parseInt($('mdur').value)||90;
  try{
    await db.collection('subjects').doc(id).update({meetLink:link,meetSchedule:sched,meetDay:day,meetHour:hour,meetMinute:minute,meetDuration:dur});
    closeMo();toast('Meet config saved!','ok');
  }catch(e){toast(e.message,'err');}
}

/* ══════════════ FILE REQUESTS ══════════════ */
async function renderRequests(){
  $('ct').innerHTML=ld();
  try{
    const [fSnap,aSnap]=await Promise.all([db.collection('items').where('status','==','pending').get(),db.collection('accessRequests').where('status','==','pending').get()]);
    let h=`<div class="sec-row"><span class="sec-lbl">File Suggestions</span><span class="sec-cnt">${fSnap.size}</span></div>`;
    if(fSnap.empty)h+=`<div class="empty" style="padding:20px 0"><p>No pending file suggestions.</p></div>`;
    fSnap.forEach(d=>{
      const it={id:d.id,...d.data()};
      h+=`<div class="req-item">
        <div class="req-info">
          <div class="req-name">${tIcon(it.type)} ${esc(it.name)}</div>
          <div class="req-meta">By ${esc(it.suggestedByName||it.suggestedBy||'?')} · ${tLbl(it.type)} · ${fmtDT(it.createdAt)}</div>
          ${it.description?`<div class="req-meta">${esc(it.description)}</div>`:''}
          ${it.subjectId?`<div class="req-meta">Subject: ${esc(it.subjectId)}</div>`:''}
        </div>
        <div class="req-acts">
          ${it.url?`<button class="btn btn-sky btn-sm" onclick="openViewer('${it.url}','${esc(it.name).replace(/'/g,"\\'")}')" >Preview</button>`:''}
          <button class="btn btn-ok btn-sm" onclick="approveItem('${it.id}')">Approve</button>
          <button class="btn btn-danger btn-sm" onclick="rejectFile('${it.id}')">Reject</button>
        </div>
      </div>`;
    });
    h+=`<div class="sec-row" style="margin-top:24px"><span class="sec-lbl">Subject Access Requests</span><span class="sec-cnt">${aSnap.size}</span></div>`;
    if(aSnap.empty)h+=`<div class="empty" style="padding:20px 0"><p>No pending access requests.</p></div>`;
    aSnap.forEach(d=>{
      const r={id:d.id,...d.data()};
      h+=`<div class="access-req">
        <div style="flex:1;min-width:0">
          <div style="font-size:.85rem;font-weight:500;color:var(--t0)">${esc(r.userName||r.userEmail||'?')} wants <strong style="color:var(--gold)">${esc(r.subjectName||r.subjectId||'?')}</strong></div>
          <div style="font-size:.64rem;color:var(--t3);font-family:var(--mono);margin-top:2px">${esc(r.userEmail)} · ${fmtDT(r.createdAt)}</div>
          ${r.message?`<div style="font-size:.78rem;color:var(--t1);margin-top:4px">"${esc(r.message)}"</div>`:''}
        </div>
        <div style="display:flex;gap:7px;flex-shrink:0">
          <button class="btn btn-ok btn-sm" onclick="grantAccess('${r.id}','${r.userId}','${r.subjectId}')">Grant</button>
          <button class="btn btn-danger btn-sm" onclick="denyAccess('${r.id}')">Deny</button>
        </div>
      </div>`;
    });
    h+=`<div class="credits">Developed by <strong>Aarav Sinha</strong> · Nexus Admin</div>`;
    $('ct').innerHTML=h;
  }catch(e){$('ct').innerHTML=`<div class="empty"><p>${e.message}</p></div>`;}
}
async function rejectFile(id){if(!confirm('Reject and delete?'))return;try{await db.collection('items').doc(id).delete();toast('Rejected.');renderRequests();loadBadges();}catch(e){toast(e.message,'err');}}
async function grantAccess(reqId,userId,subjectId){
  try{
    await db.collection('users').doc(userId).update({subjects:firebase.firestore.FieldValue.arrayUnion(subjectId)});
    await db.collection('accessRequests').doc(reqId).update({status:'granted'});
    toast('Access granted!','ok');renderRequests();loadBadges();
  }catch(e){toast(e.message,'err');}
}
async function denyAccess(reqId){
  try{await db.collection('accessRequests').doc(reqId).update({status:'denied'});toast('Denied.');renderRequests();}catch(e){toast(e.message,'err');}
}

/* VIEWER */
function openViewer(url,name){if(!url){toast('No URL.','err');return;}$('vt').textContent=name;$('vf').src=gdEmbed(url);$('viewer').style.display='flex';}
function closeViewer(){$('viewer').style.display='none';$('vf').src='';}

/* MODAL */
function openMo(){$('modal').style.display='flex';}
function closeMo(){$('modal').style.display='none';}
$('modal').addEventListener('click',e=>{if(e.target===$('modal'))closeMo();});

/* MOBILE */
$('tb-ham').addEventListener('click',()=>$('sb').classList.toggle('open'));
$('sb-x').addEventListener('click',()=>$('sb').classList.remove('open'));

/* GLOBALS */
window.goPanel=goPanel;window.handleAdd=handleAdd;window.doSignOut=doSignOut;
window.approveUser=approveUser;window.rejectUser=rejectUser;window.editUser=editUser;window.saveUser=saveUser;
window.openAddSubject=openAddSubject;window.saveNewSubject=saveNewSubject;window.editSubject=editSubject;window.updateSubject=updateSubject;window.deleteSubject=deleteSubject;
window.enterSubject=enterSubject;window.enterNode=enterNode;window.openAddItem=openAddItem;window.toggleItemFields=toggleItemFields;window.saveItem=saveItem;window.editItem=editItem;window.updateItem=updateItem;window.approveItem=approveItem;window.deleteItem=deleteItem;
window.openMeetConfig=openMeetConfig;window.saveMeetConfig=saveMeetConfig;window.startClass=startClass;window.confirmStartClass=confirmStartClass;window.markStartingSoon=markStartingSoon;window.endClass=endClass;
window.rejectFile=rejectFile;window.grantAccess=grantAccess;window.denyAccess=denyAccess;
window.openViewer=openViewer;window.closeViewer=closeViewer;window.openMo=openMo;window.closeMo=closeMo;
</script>
