<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin — Nexus</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='12' fill='%231a0e2e'/%3E%3Ctext x='50%25' y='56%25' dominant-baseline='middle' text-anchor='middle' font-size='26' font-family='serif'%3E✦%3C/text%3E%3C/svg%3E"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css"/>
<style>
body{overflow:hidden;height:100vh}
.app{display:flex;height:100vh;position:relative;z-index:1}
/* ── SIDEBAR ── */
.sb-logo{padding:20px 16px 16px}
/* Admin tabs */
.admin-tabs{display:flex;flex-direction:column;gap:1px;padding:10px 8px}
.atab{display:flex;align-items:center;gap:9px;width:100%;padding:10px 12px;border-radius:9px;background:none;border:none;color:var(--t2);font-size:.83rem;cursor:pointer;transition:all .15s;text-align:left}
.atab:hover{background:rgba(232,201,107,.06);color:var(--t1)}
.atab.on{background:var(--goldA);color:var(--gold);font-weight:500}
.atab .ic{width:20px;text-align:center;font-size:.95rem;flex-shrink:0}
.atab .badge{margin-left:auto;font-size:.6rem;background:rgba(255,123,123,.2);color:var(--rose);border-radius:99px;padding:1px 6px;font-family:var(--mono)}
/* ── MAIN ── */
.mw{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}
.tb .tb-title{font-family:var(--serif);font-size:1.1rem;font-weight:600;color:var(--t1)}
/* Content area */
.ct{flex:1;overflow-y:auto;padding:22px 22px}
.ct-in{max-width:1100px;margin:0 auto}
/* ── PANELS ── */
.panel{display:none}
.panel.on{display:block}
/* Users panel */
.user-row{display:flex;align-items:center;gap:12px;padding:13px 16px;background:rgba(255,255,255,.026);border:1px solid var(--rim);border-radius:var(--r);margin-bottom:7px;transition:border-color .18s;flex-wrap:wrap}
.user-row:hover{border-color:rgba(232,201,107,.15)}
.user-av{width:36px;height:36px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(232,201,107,.25);flex-shrink:0;background:var(--ink2);display:flex;align-items:center;justify-content:center;font-size:1rem}
.user-info{flex:1;min-width:0}
.user-nm{font-size:.88rem;font-weight:600;color:var(--t0)}
.user-em{font-size:.68rem;color:var(--t3);font-family:var(--mono)}
.user-subj{font-size:.65rem;color:var(--t2);margin-top:2px;font-family:var(--mono)}
.user-acts{display:flex;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap}
/* Subjects panel */
.subj-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(255,255,255,.026);border:1px solid var(--rim);border-radius:var(--r);margin-bottom:7px}
.subj-ic{font-size:1.4rem;flex-shrink:0}
.subj-info{flex:1;min-width:0}
.subj-nm{font-size:.88rem;font-weight:500;color:var(--t0)}
.subj-meta{font-size:.65rem;color:var(--t3);font-family:var(--mono);margin-top:2px}
/* Content tree panel */
.tree-nav{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tree-crumb{font-size:.8rem;color:var(--t2);cursor:pointer;padding:5px 10px;border-radius:7px;border:1px solid var(--rim);background:transparent;transition:all .15s}
.tree-crumb:hover,.tree-crumb.on{color:var(--gold);border-color:rgba(232,201,107,.3);background:var(--goldA)}
/* Meet settings panel */
.meet-setting-block{background:rgba(255,255,255,.026);border:1px solid var(--rim);border-radius:var(--r2);padding:20px 22px;margin-bottom:14px}
.msb-label{font-size:.62rem;font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.msb-label::before{content:'';width:10px;height:1px;background:var(--t3);opacity:.45}
/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:rgba(255,255,255,.026);border:1px solid var(--rim);border-radius:var(--r2);padding:18px;text-align:center}
.stat-num{font-family:var(--serif);font-size:2.2rem;font-weight:700;color:var(--gold);line-height:1}
.stat-lbl{font-size:.7rem;color:var(--t2);margin-top:5px;font-family:var(--mono)}
/* Access requests */
.access-req{display:flex;align-items:center;gap:10px;padding:11px 14px;background:rgba(232,201,107,.04);border:1px solid rgba(232,201,107,.14);border-radius:var(--r);margin-bottom:6px;flex-wrap:wrap}
</style>
</head>
<body>
<div class="page-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>

<!-- PAGE LOADER -->
<div class="page-loader" id="loader">
  <div style="font-size:2rem;filter:drop-shadow(0 0 18px rgba(232,201,107,.5))">✦</div>
  <div class="spin"></div>
  <div style="font-family:var(--mono);font-size:.7rem;color:var(--t3)">Loading Admin Portal…</div>
</div>

<div class="app" id="app" style="display:none">
  <!-- SIDEBAR -->
  <aside class="sb" id="sb">
    <div class="sb-logo">
      <div class="nexus-logo" style="margin-bottom:4px">
        <span class="logo-star">✦</span>
        <span class="logo-text">Nexus</span>
      </div>
      <div style="font-size:.62rem;font-family:var(--mono);color:var(--gold);opacity:.7;letter-spacing:.08em;text-transform:uppercase">⚡ Admin Panel</div>
      <button class="sb-close" id="sb-x">✕</button>
    </div>
    <div class="admin-tabs" id="admin-tabs">
      <button class="atab on" data-tab="overview" onclick="switchTab('overview')"><span class="ic">🏠</span>Overview</button>
      <button class="atab" data-tab="users" onclick="switchTab('users')"><span class="ic">👥</span>Users <span class="badge" id="pending-badge" style="display:none">0</span></button>
      <button class="atab" data-tab="subjects" onclick="switchTab('subjects')"><span class="ic">📚</span>Subjects</button>
      <button class="atab" data-tab="content" onclick="switchTab('content')"><span class="ic">📁</span>Content</button>
      <button class="atab" data-tab="meet" onclick="switchTab('meet')"><span class="ic">📹</span>Meet Settings</button>
      <button class="atab" data-tab="access" onclick="switchTab('access')"><span class="ic">🔑</span>Access Requests <span class="badge" id="access-badge" style="display:none">0</span></button>
    </div>
    <div style="flex:1"></div>
    <div class="sb-foot">
      <div class="acct-block">
        <div class="acct-top">
          <div class="acct-av" id="adm-av" style="background:var(--goldA);color:var(--gold);font-size:1.1rem;display:flex;align-items:center;justify-content:center">⚡</div>
          <div class="acct-info">
            <div class="acct-nm">Aarav Sinha</div>
            <div class="acct-em">aaravhfs@gmail.com</div>
            <span class="acct-role">Admin</span>
          </div>
        </div>
        <div class="acct-btns">
          <button class="acct-btn" onclick="window.location.href='user.html'">👁 View as User</button>
          <button class="acct-btn red" onclick="doSignOut()">Sign Out</button>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="mw">
    <header class="tb">
      <button class="tb-ham" id="tb-ham"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <span class="tb-title" id="tb-title">Overview</span>
      <div style="flex:1"></div>
      <div class="tb-r">
        <span class="tb-chip">⚡ Admin</span>
        <button class="tb-btn-add" id="tb-add-btn" style="display:none" onclick="openAddModal()">+ Add</button>
      </div>
    </header>
    <main class="ct">
      <div class="ct-in" id="ct-in">
        <!-- dynamically filled by panels -->
      </div>
    </main>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal-box">
    <div class="modal-hd"><h2 id="modal-title">Modal</h2><button class="ib" onclick="closeModal()">✕</button></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- VIEWER -->
<div class="viewer-mo" id="viewer-mo" style="display:none">
  <div class="viewer-tb">
    <button class="ib" onclick="closeViewer()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    <span class="viewer-title" id="viewer-title">Document</span>
  </div>
  <div class="viewer-body">
    <div class="viewer-frame-wrap"><iframe id="viewer-frame" src=""></iframe></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
/* ════════════════════════════════════
   NEXUS ADMIN · by Aarav Sinha
════════════════════════════════════ */
const FC={apiKey:"AIzaSyCqEEBANVyt-ybQD8z-pys2V-07-lxEWjA",authDomain:"nexus-705ef.firebaseapp.com",projectId:"nexus-705ef",storageBucket:"nexus-705ef.firebasestorage.app",messagingSenderId:"982944171585",appId:"1:982944171585:web:de65b6827ca769565ba8c0"};
const ADMIN="aaravhfs@gmail.com";
if(!firebase.apps.length)firebase.initializeApp(FC);
const auth=firebase.auth(), db=firebase.firestore();
const $=id=>document.getElementById(id);

let adminUser=null;
let currentTab='overview';
// Content tree state
let contentPath=[]; // [{id,name,type}]
let meetCfg={description:'',schedule:null,classActive:false};
const DEF_SCH={day:5,hour:20,minute:30,label:"Every Friday at 8:30 PM IST"};
let meetTimerId=null;
// Add modal context
let addContext=null; // {parentId, parentType}

/* ══ AUTH ══ */
auth.onAuthStateChanged(async u=>{
  if(!u||u.email!==ADMIN){window.location.href='index.html';return;}
  adminUser=u;
  if(u.photoURL) $('adm-av').innerHTML=`<img src="${u.photoURL}" style="width:100%;height:100%;border-radius:50%;object-fit:cover"/>`;
  await loadMeetCfg();
  $('loader').style.display='none';
  $('app').style.display='flex';
  switchTab('overview');
  loadBadges();
});

function doSignOut(){auth.signOut().then(()=>window.location.href='index.html');}

/* ══ MEET CONFIG ══ */
async function loadMeetCfg(){
  try{const d=await db.collection('config').doc('meet').get();if(d.exists)meetCfg={...meetCfg,...d.data()};}catch(e){}
}

/* ══ TOAST ══ */
function toast(msg,type){const t=$('toast');t.textContent=msg;t.className='toast show'+(type==='ok'?' ok':type==='err'?' err':'');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),3400);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(ts){if(!ts)return'—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}
function fmtDateTime(ts){if(!ts)return'—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});}
function gdriveEmbed(url){if(!url)return'';const m=url.match(/\/file\/d\/([^/?\\s]+)/);if(m)return`https://drive.google.com/file/d/${m[1]}/preview`;return url;}
function icon(t,e){if(e)return e;return{folder:'📁',subject:'🎓',chapter:'📖',pdf:'📄',studymaterial:'📝',link:'🔗',recording:'🎬',note:'📋',book:'📚'}[t]||'📁';}
function chipCls(t){const m={pdf:'chip-rose',studymaterial:'chip-teal',recording:'chip-sage',note:'chip-gold',link:'chip-lilac',folder:'chip-lilac',subject:'chip-gold',chapter:'chip-sage'};return m[t]||'chip-lilac';}
function chipLbl(t){return{folder:'Folder',subject:'Subject',chapter:'Chapter',pdf:'PDF',studymaterial:'Study Mat.',link:'Link',recording:'Recording',note:'Note',book:'Book'}[t]||t;}

/* ══ BADGES ══ */
async function loadBadges(){
  try{
    const p=await db.collection('users').where('status','==','pending').get();
    const pb=$('pending-badge');pb.textContent=p.size;pb.style.display=p.size>0?'':'none';
    const a=await db.collection('accessRequests').where('status','==','pending').get();
    const ab=$('access-badge');ab.textContent=a.size;ab.style.display=a.size>0?'':'none';
  }catch(e){}
}

/* ══ TAB SWITCH ══ */
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.atab').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  const titles={overview:'Overview',users:'User Management',subjects:'Subjects',content:'Content Manager',meet:'Meet Settings',access:'Access Requests'};
  $('tb-title').textContent=titles[tab]||tab;
  $('tb-add-btn').style.display=['subjects','content'].includes(tab)?'flex':'none';
  const panel=PANELS[tab];
  if(panel)panel();
}

/* ══════════════════════════════
   PANEL: OVERVIEW
══════════════════════════════ */
async function renderOverview(){
  $('ct-in').innerHTML='<div style="display:flex;align-items:center;gap:10px;color:var(--t2);padding:40px"><div class="spin"></div> Loading…</div>';
  try{
    const [users,subjects,items,pending,access]=await Promise.all([
      db.collection('users').get(),
      db.collection('subjects').get(),
      db.collection('items').where('status','==','approved').get(),
      db.collection('users').where('status','==','pending').get(),
      db.collection('accessRequests').where('status','==','pending').get()
    ]);
    let h=`
    <div style="margin-bottom:24px">
      <div style="font-family:var(--serif);font-size:1.8rem;color:var(--t0);margin-bottom:4px">Good day, Aarav ✦</div>
      <div style="font-size:.82rem;color:var(--t2)">Here's what's happening on Nexus</div>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num">${users.size}</div><div class="stat-lbl">Total Users</div></div>
      <div class="stat-card"><div class="stat-num">${subjects.size}</div><div class="stat-lbl">Subjects</div></div>
      <div class="stat-card"><div class="stat-num">${items.size}</div><div class="stat-lbl">Content Items</div></div>
      <div class="stat-card"><div class="stat-num" style="color:${pending.size>0?'var(--rose)':'var(--sage)'}">${pending.size}</div><div class="stat-lbl">Pending Approvals</div></div>
      <div class="stat-card"><div class="stat-num" style="color:${access.size>0?'var(--gold)':'var(--sage)'}">${access.size}</div><div class="stat-lbl">Access Requests</div></div>
    </div>`;
    if(pending.size>0){
      h+=`<div class="sec-row"><span class="sec-lbl">Pending Registrations</span></div>`;
      pending.forEach(d=>{
        const u={id:d.id,...d.data()};
        h+=`<div class="user-row">
          <div class="user-av">${u.displayName?.charAt(0)||'?'}</div>
          <div class="user-info"><div class="user-nm">${esc(u.displayName||'')}</div><div class="user-em">${esc(u.email)}</div></div>
          <div class="user-acts">
            <button class="btn btn-ok" onclick="approveUser('${u.id}')">✓ Approve</button>
            <button class="btn btn-danger" onclick="rejectUser('${u.id}')">✕ Reject</button>
          </div>
        </div>`;
      });
    }
    h+=`<div class="credits">Developed by <b>Aarav Sinha</b> · Nexus Admin</div>`;
    $('ct-in').innerHTML=h;
  }catch(e){$('ct-in').innerHTML=`<div class="empty-state"><span class="ic">⚠️</span><p>${e.message}</p></div>`;}
}

/* ══════════════════════════════
   PANEL: USERS
══════════════════════════════ */
async function renderUsers(){
  $('ct-in').innerHTML='<div style="display:flex;align-items:center;gap:10px;color:var(--t2);padding:40px"><div class="spin"></div> Loading users…</div>';
  try{
    const snap=await db.collection('users').orderBy('createdAt','desc').get();
    let pending=[],approved=[],rejected=[];
    snap.forEach(d=>{
      const u={id:d.id,...d.data()};
      if(u.status==='pending')pending.push(u);
      else if(u.status==='rejected')rejected.push(u);
      else approved.push(u);
    });
    let h='';
    // Pending
    if(pending.length){
      h+=`<div class="sec-row"><span class="sec-lbl">Pending Approval</span><span class="sec-cnt">${pending.length}</span></div>`;
      pending.forEach(u=>h+=userRow(u,true));
    }
    // Approved
    h+=`<div class="sec-row" style="margin-top:${pending.length?'24px':'0'}"><span class="sec-lbl">Approved Users</span><span class="sec-cnt">${approved.length}</span></div>`;
    if(!approved.length) h+=`<div class="empty-state"><span class="ic">👥</span><p>No approved users yet.</p></div>`;
    else approved.forEach(u=>h+=userRow(u,false));
    if(rejected.length){
      h+=`<div class="sec-row" style="margin-top:24px"><span class="sec-lbl">Rejected</span><span class="sec-cnt">${rejected.length}</span></div>`;
      rejected.forEach(u=>h+=userRow(u,false));
    }
    h+=`<div class="credits">Developed by <b>Aarav Sinha</b> · Nexus Admin</div>`;
    $('ct-in').innerHTML=h;
  }catch(e){$('ct-in').innerHTML=`<div class="empty-state"><span class="ic">⚠️</span><p>${e.message}</p></div>`;}
}

function userRow(u,showApprove){
  const subjs=u.subjects?u.subjects.join(', '):'—';
  const statusChip=u.status==='approved'?'<span class="chip chip-approved">Approved</span>':u.status==='pending'?'<span class="chip chip-pending">Pending</span>':'<span class="chip chip-rose">Rejected</span>';
  return `<div class="user-row">
    <div class="user-av" style="background:var(--goldA);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:1rem;border-radius:50%;width:36px;height:36px;flex-shrink:0">${(u.displayName||'?').charAt(0).toUpperCase()}</div>
    <div class="user-info">
      <div class="user-nm">${esc(u.displayName||'—')}</div>
      <div class="user-em">${esc(u.email||'')}</div>
      <div class="user-subj">Subjects: ${esc(subjs)} · Joined: ${fmtDate(u.createdAt)} · Last login: ${fmtDate(u.lastLogin)}</div>
      ${u.note?`<div class="user-subj" style="color:var(--t2);margin-top:2px">Note: ${esc(u.note)}</div>`:''}
    </div>
    <div class="user-acts">
      ${statusChip}
      ${showApprove?`<button class="btn btn-ok" onclick="approveUser('${u.id}')">✓ Approve</button><button class="btn btn-danger" onclick="rejectUser('${u.id}')">✕ Reject</button>`:''}
      ${u.status==='approved'?`<button class="btn btn-ghost" onclick="editUser('${u.id}')">✏️ Edit</button>`:''}
      ${u.status==='rejected'?`<button class="btn btn-ok" onclick="approveUser('${u.id}')">Re-approve</button>`:''}
    </div>
  </div>`;
}

async function approveUser(uid){
  try{
    await db.collection('users').doc(uid).update({status:'approved'});
    toast('User approved!','ok');renderUsers();loadBadges();
  }catch(e){toast(e.message,'err');}
}
async function rejectUser(uid){
  if(!confirm('Reject this registration?'))return;
  try{
    await db.collection('users').doc(uid).update({status:'rejected'});
    toast('User rejected.');renderUsers();loadBadges();
  }catch(e){toast(e.message,'err');}
}
function editUser(uid){
  // Load user data then show edit modal
  db.collection('users').doc(uid).get().then(d=>{
    const u={id:d.id,...d.data()};
    $('modal-title').textContent='Edit User';
    $('modal-body').innerHTML=`
      <div class="fg"><label>Display Name</label><input class="fi" id="eu-nm" value="${esc(u.displayName||'')}"/></div>
      <div class="fg"><label>Role</label>
        <select class="fsel" id="eu-role">
          <option value="teacher" ${u.role==='teacher'?'selected':''}>Teacher</option>
          <option value="student" ${u.role==='student'?'selected':''}>Student</option>
        </select>
      </div>
      <div class="fg"><label>Assigned Subjects (comma-separated IDs)</label>
        <input class="fi" id="eu-subj" value="${esc((u.subjects||[]).join(','))}"/>
        <span class="fi-hint">Use subject IDs from the Subjects panel.</span>
      </div>
      <div class="fg"><label>Status</label>
        <select class="fsel" id="eu-status">
          <option value="approved" ${u.status==='approved'?'selected':''}>Approved</option>
          <option value="pending" ${u.status==='pending'?'selected':''}>Pending</option>
          <option value="rejected" ${u.status==='rejected'?'selected':''}>Rejected</option>
        </select>
      </div>
      <div class="modal-ft">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-gold" onclick="saveUserEdit('${uid}')">Save</button>
      </div>`;
    $('modal').style.display='flex';
  }).catch(e=>toast(e.message,'err'));
}
async function saveUserEdit(uid){
  const nm=$('eu-nm').value.trim();
  const role=$('eu-role').value;
  const subj=$('eu-subj').value.split(',').map(s=>s.trim()).filter(Boolean);
  const status=$('eu-status').value;
  try{

async function renderContent(){
  contentPath=[];
  await renderContentTree();
}
async function renderContentTree(){
  const parentId=contentPath.length?contentPath[contentPath.length-1].id:null;
  const ptype=contentPath.length?contentPath[contentPath.length-1].type:null;
  $('ct-in').innerHTML='<div style="display:flex;align-items:center;gap:10px;color:var(--t2);padding:40px"><div class="spin"></div></div>';
  try{
    // Breadcrumb
    let bcH=`<div class="tree-nav"><button class="tree-crumb ${!contentPath.length?'on':''}" onclick="navContent([])">🏠 Root</button>`;
    contentPath.forEach((s,i)=>{
      bcH+=`<button class="tree-crumb ${i===contentPath.length-1?'on':''}" onclick="navContent(contentPath.slice(0,${i+1}))">${esc(s.name)}</button>`;
    });
    bcH+=`</div>`;

    // If chapter — show chapter view
    if(ptype==='chapter'){
      const chSnap=await db.collection('items').where('parentId','==',parentId).get();
      const children=[];chSnap.forEach(d=>children.push({id:d.id,...d.data()}));
      children.sort((a,b)=>(a.createdAt?.toMillis?.()||0)-(b.createdAt?.toMillis?.()||0));
      const tb=children.filter(c=>c.type==='pdf');
      const sm=children.filter(c=>c.type==='studymaterial');
      const rc=children.filter(c=>c.type==='recording');
      const nt=children.filter(c=>c.type==='note');
      let h=bcH;
      h+=`<div style="display:flex;justify-content:flex-end;margin-bottom:14px"><button class="tb-btn-add" onclick="openAddContentModal('${parentId}','chapter')">+ Add Resource</button></div>`;
      h+=contentSection('📖 Textbook PDF',tb)+contentSection('📚 Study Materials',sm)+contentSection('🎬 Recordings',rc)+contentSection('📋 Notes',nt);
      h+=`<div class="credits">Developed by <b>Aarav Sinha</b></div>`;
      $('ct-in').innerHTML=h;
      return;
    }

    // Normal folder/subject/root
    const q=db.collection('items').where('parentId','==',parentId);
    const snap=await q.get();
    const items=[];snap.forEach(d=>items.push({id:d.id,...d.data()}));
    items.sort((a,b)=>(a.createdAt?.toMillis?.()||0)-(b.createdAt?.toMillis?.()||0));

    let h=bcH;
    h+=`<div style="display:flex;justify-content:flex-end;margin-bottom:14px"><button class="tb-btn-add" onclick="openAddContentModal('${parentId||''}','${ptype||'root'}')">+ Add Item</button></div>`;
    if(!items.length) h+=`<div class="empty-state"><span class="ic">📭</span><p>Nothing here. Click "+ Add" to create content.</p></div>`;
    else{
      h+=`<div class="flist">`;
      items.forEach((item,i)=>{
        const pend=item.status==='pending';
        h+=`<div class="frow ${pend?'pending':''}" style="animation-delay:${i*.04}s;cursor:${['pdf','studymaterial','recording','link'].includes(item.type)?'pointer':'pointer'}">
          <div class="frow-ic">${icon(item.type,item.emoji)}</div>
          <div class="frow-body" onclick="${['folder','subject','chapter'].includes(item.type)?`navContent([...contentPath,{id:'${item.id}',name:'${esc(item.name).replace(/'/g,"\\'")}',type:'${item.type}'}])`:`openViewer('${item.url||''}','${esc(item.name).replace(/'/g,"\\'")}')` }">
            <div class="frow-nm">${esc(item.name)} ${pend?'<span style="color:var(--rose);font-size:.7rem">(Pending)</span>':''}</div>
            <div class="frow-meta">${chipLbl(item.type)} · Modified ${fmtDate(item.updatedAt||item.createdAt)}</div>
          </div>
          <div class="frow-r">
            <span class="chip ${chipCls(item.type)}">${chipLbl(item.type)}</span>
            <div class="frow-acts">
              ${pend?`<button class="ib" style="color:var(--sage)" onclick="approveItem('${item.id}')" title="Approve">✓</button>`:''}
              <button class="ib" onclick="editItem('${item.id}')" title="Edit">✏️</button>
              <button class="ib" style="color:var(--rose)" onclick="deleteItem('${item.id}')" title="Delete">🗑️</button>
            </div>
          </div>
        </div>`;
      });
      h+=`</div>`;
    }
    h+=`<div class="credits">Developed by <b>Aarav Sinha</b></div>`;
    $('ct-in').innerHTML=h;
  }catch(e){$('ct-in').innerHTML=`<div class="empty-state"><span class="ic">⚠️</span><p>${e.message}</p></div>`;}
}

function contentSection(label,items){
  let h=`<div class="sec-row" style="margin-top:16px"><span class="sec-lbl">${label}</span><span class="sec-cnt">${items.length}</span></div>`;
  if(!items.length) return h+`<div class="empty-state" style="padding:16px 0"><span class="ic" style="font-size:1.4rem">📭</span><p>None yet.</p></div>`;
  h+=`<div class="flist">`;
  items.forEach((item,i)=>{
    h+=`<div class="frow" style="animation-delay:${i*.04}s">
      <div class="frow-ic">${icon(item.type,item.emoji)}</div>
      <div class="frow-body" onclick="openViewer('${item.url||''}','${esc(item.name).replace(/'/g,"\\'")}')" style="flex:1">
        <div class="frow-nm">${esc(item.name)}</div>
        <div class="frow-meta">${fmtDate(item.updatedAt||item.createdAt)}</div>
        ${item.content?`<div class="frow-content">${esc(item.content)}</div>`:''}
      </div>
      <div class="frow-r">
        <span class="chip ${chipCls(item.type)}">${chipLbl(item.type)}</span>
        <div class="frow-acts">
          <button class="ib" onclick="editItem('${item.id}')" title="Edit">✏️</button>
          <button class="ib" style="color:var(--rose)" onclick="deleteItem('${item.id}')" title="Delete">🗑️</button>
        </div>
      </div>
    </div>`;
  });
  h+=`</div>`;
  return h;
}

function openAddContentModal(parentId,parentType){

    types=`<option value="pdf">📄 Textbook PDF</option><option value="studymaterial">📝 Study Material</option><option value="recording">🎬 Class Recording</option><option value="note">📋 Class Note / Summary</option><option value="link">🔗 External Link</option>`;

    <div class="fg"><label>Name *</label><input class="fi" id="it-name" placeholder="e.g. Chapter 1 · The Voice of the Rain" autocomplete="off"/></div>
    <div class="fg" id="it-url-g" style="display:none">
      <label>Google Drive Link</label>

    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-gold" onclick="saveItem('${pid||''}')">Add Item</button>

function toggleAddFields(){
  const t=$('it-type'),ug=$('it-url-g'),cg=$('it-content-g');
  if(!t)return;
  const needUrl=['pdf','studymaterial','recording','link'].includes(t.value);
  const isNote=t.value==='note';
  if(ug)ug.style.display=(needUrl||isNote)?'flex':'none';
  if(cg)cg.style.display=isNote?'flex':'none';
}

async function saveItem(pidRaw){
  const pid=pidRaw===''?null:pidRaw;
  const type=$('it-type').value, name=$('it-name').value.trim();
  const url=$('it-url')?.value.trim()||'';
  const content=$('it-content')?.value.trim()||'';
  const desc=$('it-desc').value.trim(), emoji=$('it-emoji').value.trim();
  if(!name){toast('Name is required.','err');return;}
  if(['pdf','studymaterial','recording','link'].includes(type)&&!url){toast('URL is required for this type.','err');return;}
  const now=firebase.firestore.FieldValue.serverTimestamp();
  const data={name,type,emoji,description:desc,parentId:pid,status:'approved',createdAt:now,updatedAt:now,createdBy:adminUser.email};
  if(url)data.url=gdriveEmbed(url);
  if(content)data.content=content;
  try{
    await db.collection('items').add(data);
    closeModal();toast(`"${name}" added!`,'ok');renderContentTree();
  }catch(e){toast(e.message,'err');console.error(e);}
}

function editItem(id){
  db.collection('items').doc(id).get().then(d=>{
    const it={id:d.id,...d.data()};
    $('modal-title').textContent='Edit Item';
    $('modal-body').innerHTML=`
      <div class="fg"><label>Name</label><input class="fi" id="ei-nm" value="${esc(it.name)}"/></div>
      <div class="fg"><label>URL / Drive Link</label><input class="fi" id="ei-url" value="${esc(it.url||'')}"/></div>
      <div class="fg"><label>Note Content</label><textarea class="fta" id="ei-content">${esc(it.content||'')}</textarea></div>
      <div class="fg"><label>Description</label><input class="fi" id="ei-desc" value="${esc(it.description||'')}"/></div>
      <div class="fg"><label>Status</label>
        <select class="fsel" id="ei-status">
          <option value="approved" ${it.status==='approved'?'selected':''}>Approved</option>
          <option value="pending" ${it.status==='pending'?'selected':''}>Pending</option>
        </select>
      </div>
      <div class="modal-ft">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-gold" onclick="updateItem('${id}')">Save</button>
      </div>`;
    $('modal').style.display='flex';
  }).catch(e=>toast(e.message,'err'));
}
async function updateItem(id){
  const nm=$('ei-nm').value.trim();
  const url=$('ei-url').value.trim();
  const content=$('ei-content').value.trim();
  const desc=$('ei-desc').value.trim();
  const status=$('ei-status').value;
  if(!nm){toast('Name required.','err');return;}
  try{
    const data={name:nm,description:desc,content,status,updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
    if(url)data.url=gdriveEmbed(url);
    await db.collection('items').doc(id).update(data);
    closeModal();toast('Updated!','ok');renderContentTree();
  }catch(e){toast(e.message,'err');}
}
async function approveItem(id){
  try{
    await db.collection('items').doc(id).update({status:'approved'});
    toast('Item approved!','ok');renderContentTree();
  }catch(e){toast(e.message,'err');}
}
async function deleteItem(id){
  if(!confirm('Delete this item and all its children?'))return;
  try{await delRecursive(id);toast('Deleted.');renderContentTree();}
  catch(e){toast(e.message,'err');}
}
async function delRecursive(id){
  const snap=await db.collection('items').where('parentId','==',id).get();
  for(const d of snap.docs)await delRecursive(d.id);
  await db.collection('items').doc(id).delete();
}

        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button class="btn btn-ok" onclick="grantAccess('${r.id}','${r.userId}','${r.subjectId}')">✓ Grant</button>
          <button class="btn btn-danger" onclick="denyAccess('${r.id}')">✕ Deny</button>
        </div>
      </div>`;
    });
    h+=`<div class="credits">Developed by <b>Aarav Sinha</b> · Nexus Admin</div>`;
    $('ct-in').innerHTML=h;
  }catch(e){$('ct-in').innerHTML=`<div class="empty-state"><span class="ic">⚠️</span><p>${e.message}</p></div>`;}
}

async function grantAccess(reqId,userId,subjectId){
  try{
    // Add subject to user's subjects array
    await db.collection('users').doc(userId).update({
      subjects:firebase.firestore.FieldValue.arrayUnion(subjectId)
    });
    await db.collection('accessRequests').doc(reqId).update({status:'granted'});
    toast('Access granted!','ok');renderAccess();loadBadges();
  }catch(e){toast(e.message,'err');}
}
async function denyAccess(reqId){
  try{
    await db.collection('accessRequests').doc(reqId).update({status:'denied'});
    toast('Request denied.');renderAccess();loadBadges();
  }catch(e){toast(e.message,'err');}
}

/* ══ VIEWER ══ */
function openViewer(url,name){
  if(!url){toast('No URL set.','err');return;}
  $('viewer-title').textContent=name;
  $('viewer-frame').src=gdriveEmbed(url);
  $('viewer-mo').style.display='flex';
}
function closeViewer(){$('viewer-mo').style.display='none';$('viewer-frame').src='';}

/* ══ MODAL ══ */
function closeModal(){$('modal').style.display='none';}
$('modal').addEventListener('click',e=>{if(e.target===$('modal'))closeModal();});

/* ══ ADD BUTTON ══ */
function openAddModal(){
  if(currentTab==='subjects') openAddSubject();
  else if(currentTab==='content') openAddContentModal(contentPath.length?contentPath[contentPath.length-1].id:'', contentPath.length?contentPath[contentPath.length-1].type:'root');
}

/* ══ PANEL MAP ══ */
const PANELS={overview:renderOverview,users:renderUsers,subjects:renderSubjects,content:renderContent,meet:renderMeet,access:renderAccess};

/* ══ MOBILE ══ */
$('tb-ham').addEventListener('click',()=>$('sb').classList.toggle('open'));
$('sb-x').addEventListener('click',()=>$('sb').classList.remove('open'));

/* ══ GLOBALS ══ */
window.switchTab=switchTab;window.approveUser=approveUser;window.rejectUser=rejectUser;
window.editUser=editUser;window.saveUserEdit=saveUserEdit;
window.openAddSubject=openAddSubject;window.saveSubject=saveSubject;window.editSubject=editSubject;window.updateSubject=updateSubject;window.deleteSubject=deleteSubject;
window.navContent=navContent;window.openAddContentModal=openAddContentModal;window.toggleAddFields=toggleAddFields;window.saveItem=saveItem;window.editItem=editItem;window.updateItem=updateItem;window.approveItem=approveItem;window.deleteItem=deleteItem;
window.saveMeetDesc=saveMeetDesc;window.saveMeetSchedule=saveMeetSchedule;window.setClassActive=setClassActive;
window.grantAccess=grantAccess;window.denyAccess=denyAccess;
window.openViewer=openViewer;window.closeViewer=closeViewer;window.closeModal=closeModal;window.openAddModal=openAddModal;window.doSignOut=doSignOut;
</script>
